<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
<meta name="theme-color" content="#b8973a"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="APPACHI"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icons/icon-192.png"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet"/>
<title>Leaves · APPACHI</title>
<style>
:root{
  --bg:#eef2f7;--surface:#fff;--surface2:#e8edf5;
  --navy:#0f2044;--navy2:#1a3260;--navy-text:#0f1f3d;
  --gold:#b8973a;--gold-light:#d4ae56;--gold-dim:#9a7a28;
  --muted:#4a5a78;--border:#c0cee4;--gold-border:rgba(184,151,58,.3);
  --leave-bg:#fff5f5;--leave-border:rgba(239,68,68,.3);--leave-dot:#ef4444;
  --shadow-sm:0 2px 12px rgba(15,32,68,.09);--radius:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:clamp(14px,1.6vw,16px)}
body{font-family:"Montserrat",sans-serif;font-weight:600;background:var(--bg);color:var(--navy-text);min-height:100dvh;width:100%;overflow-x:hidden}
@media(hover:none){select,input{font-size:16px!important}}

/* ── Topbar ── */
.topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:env(safe-area-inset-top,0) 32px 0;min-height:calc(60px + env(safe-area-inset-top,0));background:var(--navy);border-bottom:2px solid var(--gold-border);box-shadow:0 2px 20px rgba(15,32,68,.28)}
.topbar-brand{font-family:"Cormorant Garamond",serif;font-size:20px;font-weight:700;letter-spacing:.14em;color:var(--gold-light);text-decoration:none}
.topbar-right{display:flex;align-items:center;gap:14px}
.datetime-badge{font-size:12px;font-weight:700;letter-spacing:.06em;color:rgba(255,255,255,.65);text-transform:uppercase}
.theme-btn{background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.6);font-size:14px;cursor:pointer;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.theme-btn:hover{border-color:var(--gold-light);color:var(--gold-light)}
.back-btn{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.55);text-decoration:none;transition:color .2s}
.back-btn:hover{color:var(--gold-light)}

/* ── Hero ── */
.hero{padding:32px 32px 24px;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:14px;background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);border-bottom:1px solid var(--gold-border)}
.hero-title{font-family:"Cormorant Garamond",serif;font-size:clamp(28px,4vw,42px);font-weight:700;letter-spacing:.04em;color:#fff}
.hero-title span{background:linear-gradient(135deg,var(--gold-light),var(--gold-dim));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{font-size:10px;font-weight:700;letter-spacing:.2em;color:rgba(255,255,255,.4);text-transform:uppercase;margin-top:5px}
.hero-stat{text-align:right}
.stat-num{font-family:"Cormorant Garamond",serif;font-size:34px;font-weight:700;color:var(--gold-light);line-height:1}
.stat-label{font-size:10px;font-weight:700;letter-spacing:.14em;color:rgba(255,255,255,.4);text-transform:uppercase}

/* ── Page body ── */
.page-body{padding:28px 32px;display:flex;flex-direction:column;gap:24px;max-width:960px;margin:0 auto;width:100%}

/* ── Card shell ── */
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:hidden}
.card-head{padding:18px 22px;display:flex;align-items:center;flex-wrap:wrap;gap:12px;border-bottom:1.5px solid var(--border)}
.card-title{font-size:11px;font-weight:800;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;flex:1}

/* ── Mode toggle ── */
.mode-toggle{display:flex;border:1.5px solid var(--border);border-radius:8px;overflow:hidden}
.mode-btn{font-family:"Montserrat",sans-serif;font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:9px 20px;border:none;background:none;color:var(--muted);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.mode-btn.active{background:var(--navy);color:var(--gold-light)}
.mode-btn:first-child{border-right:1.5px solid var(--border)}

/* ── Form fields ── */
.add-panel{padding:20px 22px 24px;display:flex;flex-direction:column;gap:18px}
.field-group{display:flex;flex-direction:column;gap:6px}
.field-label{font-size:11px;font-weight:800;letter-spacing:.12em;color:var(--muted);text-transform:uppercase}
.lux-input{width:100%;padding:10px 13px;font-family:"Montserrat",sans-serif;font-size:13px;font-weight:700;color:var(--navy-text);background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;outline:none;transition:border-color .2s}
.lux-input:focus{border-color:var(--gold)}
.select-wrap{position:relative;max-width:280px}
.select-wrap::after{content:"▾";position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--gold);font-size:12px;pointer-events:none}
.lux-select{-webkit-appearance:none;appearance:none;cursor:pointer;padding-right:32px}

/* ── Gender-sectioned chip grid ── */
.gender-section{border:1.5px solid var(--border);border-radius:10px;overflow:hidden}
.gender-section+.gender-section{margin-top:10px}
.gender-header{width:100%;display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface2);border:none;cursor:pointer;font-family:"Montserrat",sans-serif;font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);transition:background .15s}
.gender-header:hover{background:#dde4ef}
.gender-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.gender-dot.female{background:#e879a0}
.gender-dot.male{background:#3b82f6}
.gender-label{flex:1;text-align:left}
.gender-count{font-size:10px;background:rgba(74,90,120,.12);padding:2px 8px;border-radius:10px;color:var(--muted)}
.gender-chevron{font-size:12px;color:var(--muted);transition:transform .2s}
.gender-chevron.closed{transform:rotate(-90deg)}
.gender-chips{display:flex;flex-wrap:wrap;gap:7px;padding:12px 14px}
.gender-chips.hidden{display:none}

.emp-chip{font-family:"Montserrat",sans-serif;font-size:12px;font-weight:700;padding:6px 13px;border-radius:18px;border:1.5px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;transition:all .14s;user-select:none}
.emp-chip:hover{border-color:var(--gold-border);color:var(--navy-text)}
.emp-chip.selected{background:var(--navy);border-color:var(--navy);color:var(--gold-light)}

/* ── Date rows (by-name mode) ── */
.date-rows{display:flex;flex-direction:column;gap:8px}
.date-row{display:flex;align-items:center;gap:8px}
.date-row .lux-input{flex:1}
.date-row-del{background:none;border:1.5px solid var(--border);color:var(--muted);border-radius:7px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;flex-shrink:0;transition:all .14s}
.date-row-del:hover{border-color:var(--leave-dot);color:var(--leave-dot)}
.add-date-btn{background:none;border:1.5px dashed var(--border);color:var(--muted);font-family:"Montserrat",sans-serif;font-size:12px;font-weight:700;letter-spacing:.06em;padding:8px 14px;border-radius:8px;cursor:pointer;transition:all .14s;align-self:flex-start}
.add-date-btn:hover{border-color:var(--gold);color:var(--gold)}

/* ── Submit ── */
.submit-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.lux-btn{font-family:"Montserrat",sans-serif;font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#fff;background:linear-gradient(135deg,var(--navy2),var(--navy));border:1px solid var(--gold-border);border-radius:10px;padding:12px 32px;cursor:pointer;transition:box-shadow .2s,transform .15s}
.lux-btn:hover{box-shadow:0 6px 22px rgba(15,32,68,.3);transform:translateY(-1px)}
.lux-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.result-msg{font-size:12px;font-weight:700;color:var(--gold-dim)}

/* ── Records ── */
.view-toggle{display:flex;border:1.5px solid var(--border);border-radius:8px;overflow:hidden}
.vt-btn{font-family:"Montserrat",sans-serif;font-size:11px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;padding:7px 15px;border:none;background:none;color:var(--muted);cursor:pointer;transition:all .14s}
.vt-btn.active{background:var(--navy2);color:var(--gold-light)}
.vt-btn:first-child{border-right:1.5px solid var(--border)}

.filter-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:12px 22px;border-bottom:1.5px solid var(--border);background:var(--surface2)}
.filter-label{font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap}
.filter-input{padding:7px 11px;font-family:"Montserrat",sans-serif;font-size:12px;font-weight:700;color:var(--navy-text);background:var(--surface);border:1.5px solid var(--border);border-radius:7px;outline:none;transition:border-color .18s}
.filter-input:focus{border-color:var(--gold)}
.clear-btn{font-family:"Montserrat",sans-serif;font-size:11px;font-weight:700;padding:6px 13px;border:1.5px solid var(--border);border-radius:7px;background:none;color:var(--muted);cursor:pointer;transition:all .14s}
.clear-btn:hover{border-color:var(--gold);color:var(--gold)}

.records-body{padding:16px 22px;display:flex;flex-direction:column;gap:10px;min-height:80px}
.records-empty{text-align:center;padding:36px 20px;color:var(--muted);font-size:13px;font-style:italic}

/* ── Leave group ── */
.leave-group{border:1.5px solid var(--leave-border);border-radius:10px;overflow:hidden;background:var(--leave-bg)}
.leave-group-head{padding:11px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--leave-border);background:rgba(239,68,68,.04)}
.leave-dot-icon{width:7px;height:7px;border-radius:50%;background:var(--leave-dot);flex-shrink:0}
.lg-date{font-size:13px;font-weight:800;color:var(--navy-text);flex:1}
.lg-day{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.05em}
.lg-count{font-size:10px;font-weight:800;color:var(--leave-dot);background:rgba(239,68,68,.1);padding:2px 9px;border-radius:10px}
.today-tag{font-size:9px;font-weight:800;letter-spacing:.1em;color:#fff;background:var(--leave-dot);padding:2px 7px;border-radius:6px;margin-left:6px}

.leave-rows{padding:6px 12px;display:flex;flex-direction:column;gap:2px}
.leave-row{display:flex;align-items:center;gap:10px;padding:8px 8px;border-radius:7px;transition:background .12s}
.leave-row:hover{background:rgba(239,68,68,.05)}
.lr-name{font-size:13px;font-weight:700;color:var(--navy-text);flex:1;min-width:0}
.lr-date{font-size:12px;font-weight:700;color:var(--muted);flex:1}
.lr-day{font-size:11px;color:var(--muted);font-weight:600;margin-left:6px}

/* Booked-by badge */
.booked-badge{font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:2px 8px;border-radius:10px;flex-shrink:0;white-space:nowrap}
.booked-admin{background:rgba(184,151,58,.15);color:var(--gold-dim);border:1px solid rgba(184,151,58,.3)}
.booked-self{background:rgba(59,130,246,.12);color:#2563eb;border:1px solid rgba(59,130,246,.25)}

.del-btn{background:none;border:1.5px solid rgba(239,68,68,.25);color:var(--leave-dot);border-radius:6px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;flex-shrink:0;transition:all .14s}
.del-btn:hover{background:rgba(239,68,68,.1);border-color:var(--leave-dot)}

/* ── Loading ── */
.loading-overlay{position:fixed;inset:0;z-index:400;background:rgba(10,20,45,.55);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center}
.loading-overlay.show{display:flex}
.lux-spinner{width:44px;height:44px;border:3px solid rgba(212,174,86,.2);border-top-color:var(--gold-light);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Dark mode ── */
body.dark-mode{
  --bg:#0c0f14;--surface:#111620;--surface2:#161c27;
  --navy:#080c13;--navy2:#0f1827;--navy-text:#dde6f3;
  --gold:#d4ae56;--gold-light:#e8c96a;--gold-dim:#b8973a;
  --muted:#6a7a96;--border:#222d40;--gold-border:rgba(212,174,86,.3);
  --leave-bg:rgba(239,68,68,.05);--leave-border:rgba(239,68,68,.2);
}
body.dark-mode .topbar{background:#050810}
body.dark-mode .hero{background:linear-gradient(135deg,#050810 0%,#0a1020 100%)}
body.dark-mode .gender-header:hover{background:#1a2234}
body.dark-mode .lux-input,.dark-mode .filter-input{background:var(--surface2);color:var(--navy-text);border-color:var(--border)}
body.dark-mode input[type="date"]{color-scheme:dark}
body.dark-mode input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(.75) brightness(1.4);cursor:pointer}
body.dark-mode .emp-chip{background:var(--surface2);border-color:var(--border);color:var(--muted)}
body.dark-mode .emp-chip.selected{background:var(--navy2);color:var(--gold-light);border-color:var(--gold-border)}
body.dark-mode .filter-bar{background:var(--surface2)}
body.dark-mode .leave-row-name,.dark-mode .lr-name{color:var(--navy-text)}
body.dark-mode .booked-self{background:rgba(59,130,246,.1);color:#60a5fa;border-color:rgba(59,130,246,.2)}
body.dark-mode .booked-admin{background:rgba(184,151,58,.12);border-color:rgba(184,151,58,.25)}
body.dark-mode .lg-date{color:var(--navy-text)}

/* ── Mobile ── */
@media(max-width:640px){
  .topbar,.hero,.page-body{padding-left:16px;padding-right:16px}
  .hero{padding-top:22px;padding-bottom:16px}
  .page-body{padding-top:18px;gap:18px}
  .add-panel,.records-body,.card-head{padding-left:16px;padding-right:16px}
  .filter-bar{padding-left:16px;padding-right:16px}
  .mode-btn{padding:9px 14px;font-size:11px}
}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--gold);border-radius:4px}
</style>
</head>
<body class="dark-mode">

<header class="topbar">
  <a href="/" class="topbar-brand">&#11041; APPACHI</a>
  <div class="topbar-right">
    <a href="/" class="back-btn">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Dashboard
    </a>
    <div class="datetime-badge" id="date-time">&mdash;</div>
    <span class="datetime-badge" id="userLabel" style="font-size:11px"></span>
    <button class="theme-btn" id="themeToggle" onclick="toggleTheme()" title="Toggle theme">&#9728;</button>
  </div>
</header>

<section class="hero">
  <div>
    <div class="hero-title">Leave <span>Management</span></div>
    <div class="hero-sub">Track &amp; manage staff absences</div>
  </div>
  <div class="hero-stat">
    <div class="stat-num" id="stat-today">—</div>
    <div class="stat-label">On leave today</div>
  </div>
</section>

<div class="page-body">

  <!-- ── ADD LEAVE ── -->
  <div class="card">
    <div class="card-head">
      <div class="card-title">Record Leave</div>
      <div class="mode-toggle">
        <button class="mode-btn active" id="btn-by-date" onclick="setMode('date')">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          By Date
        </button>
        <button class="mode-btn" id="btn-by-name" onclick="setMode('name')">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          By Employee
        </button>
      </div>
    </div>

    <!-- By Date -->
    <div class="add-panel" id="panel-date">
      <div class="field-group">
        <div class="field-label">Date</div>
        <input type="date" id="leave-date" class="lux-input" style="max-width:200px"/>
      </div>
      <div class="field-group">
        <div class="field-label">Select employees on leave</div>
        <div id="chip-container">
          <!-- Female section -->
          <div class="gender-section">
            <button class="gender-header" onclick="toggleGender('female',this)">
              <span class="gender-dot female"></span>
              <span class="gender-label">Female</span>
              <span class="gender-count" id="female-count">0</span>
              <span class="gender-chevron" id="chevron-female">▾</span>
            </button>
            <div class="gender-chips" id="chips-female"><span style="color:var(--muted);font-size:12px;font-style:italic">Loading…</span></div>
          </div>
          <!-- Male section -->
          <div class="gender-section" style="margin-top:10px">
            <button class="gender-header" onclick="toggleGender('male',this)">
              <span class="gender-dot male"></span>
              <span class="gender-label">Male</span>
              <span class="gender-count" id="male-count">0</span>
              <span class="gender-chevron" id="chevron-male">▾</span>
            </button>
            <div class="gender-chips" id="chips-male"></div>
          </div>
        </div>
      </div>
      <div class="submit-row">
        <button class="lux-btn" onclick="addByDate()" id="btn-add-date">Record Leaves</button>
        <span class="result-msg" id="msg-date"></span>
      </div>
    </div>

    <!-- By Employee -->
    <div class="add-panel" id="panel-name" style="display:none">
      <div class="field-group">
        <div class="field-label">Employee</div>
        <div class="select-wrap">
          <select id="leave-emp" class="lux-input lux-select">
            <option value="">— Select employee —</option>
          </select>
        </div>
      </div>
      <div class="field-group">
        <div class="field-label">Leave Dates</div>
        <div class="date-rows" id="date-rows"></div>
        <button class="add-date-btn" onclick="addDateRow()">+ Add another date</button>
      </div>
      <div class="submit-row">
        <button class="lux-btn" onclick="addByName()" id="btn-add-name">Record Leaves</button>
        <span class="result-msg" id="msg-name"></span>
      </div>
    </div>
  </div>

  <!-- ── RECORDS ── -->
  <div class="card">
    <div class="card-head">
      <div class="card-title">Leave Records</div>
      <div class="view-toggle">
        <button class="vt-btn active" id="vt-date" onclick="setView('date')">By Date</button>
        <button class="vt-btn" id="vt-emp" onclick="setView('emp')">By Employee</button>
      </div>
    </div>
    <div class="filter-bar">
      <span class="filter-label">From</span>
      <input type="date" id="filter-from" class="filter-input" onchange="renderRecords()"/>
      <span class="filter-label">To</span>
      <input type="date" id="filter-to" class="filter-input" onchange="renderRecords()"/>
      <input type="text" id="filter-search" class="filter-input" placeholder="Search name…" oninput="renderRecords()" style="max-width:130px"/>
      <button class="clear-btn" onclick="clearFilters()">Clear</button>
    </div>
    <div class="records-body" id="records-body">
      <div class="records-empty">Loading…</div>
    </div>
  </div>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="lux-spinner"></div>
</div>

<script>
let allEmployees = [];
let allLeaves    = [];
let currentMode  = 'date';
let currentView  = 'date';
let selectedEmps = new Set();
let currentRole  = 'STAFF';
let currentAlias = '';

/* ── Init ── */
async function init() {
  document.getElementById('leave-date').value = new Date().toLocaleDateString('en-CA');
  setDefaultFilters();
  try {
    const [me, emps, leaves] = await Promise.all([
      fetch('/api/me').then(r => r.ok ? r.json() : null),
      fetch('/api/employees').then(r => r.json()),
      fetch('/api/leaves').then(r => r.json()),
    ]);
    currentRole  = me?.role  || 'STAFF';
    currentAlias = me?.name  || '';
    allEmployees = emps;
    allLeaves    = leaves;

    if (currentRole === 'OWNER') {
      buildChipGrid();
      buildEmpDropdown();
      addDateRow();
    } else {
      setupSelfBookingMode();
    }

    updateTodayStat();
    renderRecords();
  } catch (e) { console.error(e); }
}

/* ── Self-booking mode (non-OWNER) ── */
function setupSelfBookingMode() {
  document.querySelector('.mode-toggle').style.display = 'none';
  document.getElementById('panel-date').style.display  = 'none';
  document.getElementById('panel-name').style.display  = 'none';
  document.querySelector('.card-head .card-title').textContent = 'Book My Leave';

  const selfPanel = document.createElement('div');
  selfPanel.className = 'add-panel';
  selfPanel.id = 'panel-self';
  selfPanel.innerHTML = `
    <div class="field-group">
      <div class="field-label">Leave Dates</div>
      <div class="date-rows" id="self-date-rows"></div>
      <button class="add-date-btn" onclick="addSelfDateRow()">+ Add another date</button>
    </div>
    <div class="submit-row">
      <button class="lux-btn" onclick="addSelfLeave()" id="btn-add-self">Book Leave</button>
      <span class="result-msg" id="msg-self"></span>
    </div>
  `;
  const panelDate = document.getElementById('panel-date');
  panelDate.parentNode.insertBefore(selfPanel, panelDate);
  addSelfDateRow();
}

function addSelfDateRow() {
  const rows = document.getElementById('self-date-rows');
  const row  = document.createElement('div');
  row.className = 'date-row';
  const inp = document.createElement('input');
  inp.type = 'date'; inp.className = 'lux-input self-date-input';
  inp.value = new Date().toLocaleDateString('en-CA');
  const del = document.createElement('button');
  del.className = 'date-row-del'; del.innerHTML = '&times;'; del.title = 'Remove';
  del.onclick = () => { if (document.querySelectorAll('#self-date-rows .date-row').length > 1) row.remove(); };
  row.appendChild(inp); row.appendChild(del); rows.appendChild(row);
}

async function addSelfLeave() {
  const dates = [...document.querySelectorAll('#self-date-rows .self-date-input')]
    .map(i => i.value.trim()).filter(Boolean);
  if (!dates.length) { showMsg('msg-self', '⚠ Add at least one date'); return; }
  showLoading(true);
  let inserted = 0, already = 0;
  try {
    for (const date of dates) {
      const r = await fetch('/api/my-leaves', {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ date }),
      }).then(r => r.json());
      if (r.inserted) inserted++;
      else if (r.ok)  already++;
    }
    const msg = inserted
      ? `✓ ${inserted} leave day${inserted !== 1 ? 's' : ''} booked${already ? ` (${already} already existed)` : ''}`
      : `⚠ Already booked`;
    showMsg('msg-self', msg);
    document.getElementById('self-date-rows').innerHTML = '';
    addSelfDateRow();
    await refreshLeaves();
  } catch (e) { showMsg('msg-self', '✕ ' + e.message); }
  finally { showLoading(false); }
}

function setDefaultFilters() {
  const now    = new Date();
  const past   = new Date(now); past.setDate(past.getDate() - 14);
  const future = new Date(now); future.setDate(future.getDate() + 60);
  document.getElementById('filter-from').value = past.toLocaleDateString('en-CA');
  document.getElementById('filter-to').value   = future.toLocaleDateString('en-CA');
}

function updateTodayStat() {
  const today = new Date().toLocaleDateString('en-CA');
  document.getElementById('stat-today').textContent = allLeaves.filter(l => l.date === today).length;
}

/* ── Chip grid with gender sections ── */
function buildChipGrid() {
  const female = allEmployees.filter(e => e.gender === 'FEMALE');
  const male   = allEmployees.filter(e => e.gender === 'MALE');

  document.getElementById('female-count').textContent = female.length;
  document.getElementById('male-count').textContent   = male.length;

  fillChips('chips-female', female);
  fillChips('chips-male',   male);
  selectedEmps.clear();
}

function fillChips(containerId, emps) {
  const wrap = document.getElementById(containerId);
  wrap.innerHTML = '';
  emps.forEach(emp => {
    const alias = emp.alias_name || emp.name;
    const chip  = document.createElement('div');
    chip.className = 'emp-chip';
    chip.textContent = alias;
    chip.dataset.alias = alias;
    chip.addEventListener('click', () => {
      if (selectedEmps.has(alias)) { selectedEmps.delete(alias); chip.classList.remove('selected'); }
      else                          { selectedEmps.add(alias);    chip.classList.add('selected');    }
    });
    wrap.appendChild(chip);
  });
  if (!emps.length) wrap.innerHTML = '<span style="color:var(--muted);font-size:12px;font-style:italic">None</span>';
}

function toggleGender(gender, btn) {
  const chips   = document.getElementById('chips-' + gender);
  const chevron = document.getElementById('chevron-' + gender);
  const hidden  = chips.classList.toggle('hidden');
  chevron.classList.toggle('closed', hidden);
}

/* ── Employee dropdown with optgroups ── */
function buildEmpDropdown() {
  const sel = document.getElementById('leave-emp');
  const female = allEmployees.filter(e => e.gender === 'FEMALE');
  const male   = allEmployees.filter(e => e.gender === 'MALE');

  [['Female', female], ['Male', male]].forEach(([label, emps]) => {
    const grp = document.createElement('optgroup');
    grp.label = label;
    emps.forEach(emp => {
      const alias = emp.alias_name || emp.name;
      const opt = document.createElement('option');
      opt.value = alias; opt.textContent = alias;
      grp.appendChild(opt);
    });
    sel.appendChild(grp);
  });
}

/* ── Date rows ── */
function addDateRow() {
  const rows = document.getElementById('date-rows');
  const row  = document.createElement('div');
  row.className = 'date-row';
  const inp = document.createElement('input');
  inp.type = 'date'; inp.className = 'lux-input leave-date-input';
  inp.value = new Date().toLocaleDateString('en-CA');
  const del = document.createElement('button');
  del.className = 'date-row-del'; del.innerHTML = '&times;'; del.title = 'Remove';
  del.onclick = () => { if (document.querySelectorAll('#date-rows .date-row').length > 1) row.remove(); };
  row.appendChild(inp); row.appendChild(del); rows.appendChild(row);
}

/* ── Mode / View ── */
function setMode(m) {
  currentMode = m;
  document.getElementById('panel-date').style.display = m === 'date' ? '' : 'none';
  document.getElementById('panel-name').style.display = m === 'name' ? '' : 'none';
  document.getElementById('btn-by-date').classList.toggle('active', m === 'date');
  document.getElementById('btn-by-name').classList.toggle('active', m === 'name');
}
function setView(v) {
  currentView = v;
  document.getElementById('vt-date').classList.toggle('active', v === 'date');
  document.getElementById('vt-emp').classList.toggle('active', v === 'emp');
  renderRecords();
}

/* ── Submit ── */
async function addByDate() {
  const date    = document.getElementById('leave-date').value;
  const aliases = [...selectedEmps];
  if (!date)           { showMsg('msg-date', '⚠ Select a date'); return; }
  if (!aliases.length) { showMsg('msg-date', '⚠ Select at least one employee'); return; }
  showLoading(true);
  try {
    const r = await fetch('/api/leaves', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ date, aliases }) }).then(r=>r.json());
    if (r.error) { showMsg('msg-date', '✕ ' + r.error); return; }
    showMsg('msg-date', `✓ ${r.inserted} recorded${r.skipped ? ` (${r.skipped} already existed)` : ''}${r.reassigned ? ` · ${r.reassigned} stock${r.reassigned!==1?'s':''} reassigned` : ''}`);
    selectedEmps.clear();
    document.querySelectorAll('.emp-chip.selected').forEach(c => c.classList.remove('selected'));
    await refreshLeaves();
  } catch(e) { showMsg('msg-date', '✕ ' + e.message); }
  finally { showLoading(false); }
}

async function addByName() {
  const alias = document.getElementById('leave-emp').value;
  const dates = [...document.querySelectorAll('#date-rows .leave-date-input')].map(i=>i.value.trim()).filter(Boolean);
  if (!alias)        { showMsg('msg-name', '⚠ Select an employee'); return; }
  if (!dates.length) { showMsg('msg-name', '⚠ Add at least one date'); return; }
  showLoading(true);
  try {
    const r = await fetch('/api/leaves', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ alias, dates }) }).then(r=>r.json());
    if (r.error) { showMsg('msg-name', '✕ ' + r.error); return; }
    showMsg('msg-name', `✓ ${r.inserted} recorded${r.skipped ? ` (${r.skipped} already existed)` : ''}${r.reassigned ? ` · ${r.reassigned} stock${r.reassigned!==1?'s':''} reassigned` : ''}`);
    document.getElementById('date-rows').innerHTML = '';
    addDateRow();
    await refreshLeaves();
  } catch(e) { showMsg('msg-name', '✕ ' + e.message); }
  finally { showLoading(false); }
}

function canDelete(l) {
  if (currentRole === 'OWNER') return true;
  return l.emp_alias === currentAlias;
}

async function deleteLeave(id, btn) {
  btn.disabled = true;
  const endpoint = currentRole === 'OWNER' ? `/api/leaves/${id}` : `/api/my-leaves/${id}`;
  try { await fetch(endpoint, { method:'DELETE' }); await refreshLeaves(); }
  catch(e) { btn.disabled = false; }
}

async function refreshLeaves() {
  allLeaves = await fetch('/api/leaves').then(r => r.json());
  updateTodayStat();
  renderRecords();
}

/* ── Filters ── */
function clearFilters() {
  setDefaultFilters();
  document.getElementById('filter-search').value = '';
  renderRecords();
}

/* ── Render records ── */
function renderRecords() {
  const from   = document.getElementById('filter-from').value;
  const to     = document.getElementById('filter-to').value;
  const search = document.getElementById('filter-search').value.trim().toLowerCase();
  const body   = document.getElementById('records-body');
  const filtered = allLeaves.filter(l => {
    if (from && l.date < from) return false;
    if (to   && l.date > to)   return false;
    if (search && !l.emp_alias.toLowerCase().includes(search)) return false;
    return true;
  });
  if (!filtered.length) { body.innerHTML = '<div class="records-empty">No records found for the selected filters.</div>'; return; }
  currentView === 'date' ? renderByDate(filtered, body) : renderByEmp(filtered, body);
}

function bookedBadge(bookedBy) {
  if (bookedBy === 'SELF')  return '<span class="booked-badge booked-self">Employee</span>';
  if (bookedBy === 'ADMIN') return '<span class="booked-badge booked-admin">Admin</span>';
  return ''; // truly unknown — shouldn't happen with the new table
}

function renderByDate(rows, body) {
  const map = new Map();
  rows.forEach(l => { if (!map.has(l.date)) map.set(l.date, []); map.get(l.date).push(l); });
  const sorted = [...map.keys()].sort((a,b) => b.localeCompare(a));
  const today  = new Date().toLocaleDateString('en-CA');
  body.innerHTML = '';
  sorted.forEach(date => {
    const entries = map.get(date);
    const isToday = date === today;
    const g = document.createElement('div');
    g.className = 'leave-group';
    g.innerHTML = `
      <div class="leave-group-head">
        <div class="leave-dot-icon"></div>
        <div class="lg-date">${fmtDate(date)}${isToday ? '<span class="today-tag">TODAY</span>' : ''}</div>
        <div class="lg-day">${fmtDay(date)}</div>
        <div class="lg-count">${entries.length} on leave</div>
      </div>
      <div class="leave-rows">
        ${entries.map(l => `
          <div class="leave-row">
            <div class="lr-name">${esc(l.emp_alias)}</div>
            ${bookedBadge(l.booked_by)}
            ${canDelete(l) ? `<button class="del-btn" onclick="deleteLeave(${l.id},this)" title="Remove">&times;</button>` : ''}
          </div>`).join('')}
      </div>`;
    body.appendChild(g);
  });
}

function renderByEmp(rows, body) {
  const map = new Map();
  rows.forEach(l => { if (!map.has(l.emp_alias)) map.set(l.emp_alias, []); map.get(l.emp_alias).push(l); });
  const sorted = [...map.keys()].sort();
  body.innerHTML = '';
  sorted.forEach(alias => {
    const entries = map.get(alias).sort((a,b) => b.date.localeCompare(a.date));
    const g = document.createElement('div');
    g.className = 'leave-group';
    g.innerHTML = `
      <div class="leave-group-head">
        <div class="leave-dot-icon"></div>
        <div class="lg-date">${esc(alias)}</div>
        <div class="lg-count">${entries.length} day${entries.length!==1?'s':''}</div>
      </div>
      <div class="leave-rows">
        ${entries.map(l => `
          <div class="leave-row">
            <div class="lr-date">${fmtDate(l.date)}<span class="lr-day">${fmtDay(l.date)}</span></div>
            ${bookedBadge(l.booked_by)}
            ${canDelete(l) ? `<button class="del-btn" onclick="deleteLeave(${l.id},this)" title="Remove">&times;</button>` : ''}
          </div>`).join('')}
      </div>`;
    body.appendChild(g);
  });
}

/* ── Helpers ── */
function fmtDate(s) { return new Date(s+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); }
function fmtDay(s)  { return new Date(s+'T12:00:00').toLocaleDateString('en-GB',{weekday:'long'}); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showLoading(on) { document.getElementById('loadingOverlay').classList.toggle('show',on); }
function showMsg(id, msg) { const el=document.getElementById(id); el.textContent=msg; clearTimeout(el._t); el._t=setTimeout(()=>{el.textContent=''},4000); }

function updateDatetime() {
  const now=new Date(), h=now.getHours(), m=now.getMinutes();
  const ap=h>=12?'PM':'AM', h12=h%12||12;
  document.getElementById('date-time').textContent =
    now.toLocaleDateString('en-GB',{day:'2-digit',month:'2-digit',year:'numeric'}) +
    '  ·  ' + h12 + ':' + String(m).padStart(2,'0') + ' ' + ap;
}
updateDatetime(); setInterval(updateDatetime,30000);

function toggleTheme() {
  document.body.classList.toggle('dark-mode');
  document.getElementById('themeToggle').innerHTML = document.body.classList.contains('dark-mode') ? '&#9728;' : '&#9790;';
}

init();
</script>
<script src="/pwa.js" defer></script>
<script src="/auth.js"></script>
</body>
