<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#b8973a"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="AJ Stocks"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icons/icon-192.png"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet"/>
<title>Leaves · Appachi Jewellery</title>
<style>
:root{
  --bg:#eef2f7;--surface:#fff;--surface2:#e8edf5;--surface3:#dde4ef;
  --navy:#0f2044;--navy2:#1a3260;--navy-text:#0f1f3d;
  --gold:#b8973a;--gold-light:#d4ae56;--gold-dim:#9a7a28;
  --muted:#4a5a78;--border:#c0cee4;--gold-border:rgba(184,151,58,.3);
  --leave-bg:#fff5f5;--leave-border:rgba(239,68,68,.35);--leave-dot:#ef4444;
  --shadow-sm:0 2px 12px rgba(15,32,68,.09);--shadow-md:0 6px 28px rgba(15,32,68,.14);
  --radius:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:"Montserrat",sans-serif;font-weight:600;background:var(--bg);color:var(--navy-text);min-height:100dvh;overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(circle,rgba(15,32,68,.04) 1px,transparent 1px);background-size:28px 28px}
@media(hover:none){select,input{font-size:16px !important}}
.notif-on{color:var(--gold-light) !important;opacity:1 !important}

/* ── Topbar ── */
.topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:env(safe-area-inset-top,0px) 40px 0;min-height:calc(62px + env(safe-area-inset-top,0px));background:var(--navy);border-bottom:2px solid var(--gold-border);box-shadow:0 2px 20px rgba(15,32,68,.28)}
.topbar-brand{font-family:"Cormorant Garamond",serif;font-size:21px;font-weight:700;letter-spacing:.14em;color:var(--gold-light);text-decoration:none}
.topbar-right{display:flex;align-items:center;gap:16px}
.datetime-badge{font-size:12px;font-weight:700;letter-spacing:.06em;color:rgba(255,255,255,.7);text-transform:uppercase}
.theme-btn{background:none;border:1px solid rgba(255,255,255,.22);color:rgba(255,255,255,.65);font-size:15px;cursor:pointer;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.theme-btn:hover{border-color:var(--gold-light);color:var(--gold-light)}
.back-btn{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.6);text-decoration:none;transition:color .2s;white-space:nowrap}
.back-btn:hover{color:var(--gold-light)}

/* ── Hero ── */
.hero{position:relative;z-index:1;padding:36px 40px 28px;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px;background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);border-bottom:1px solid var(--gold-border)}
.hero-title{font-family:"Cormorant Garamond",serif;font-size:clamp(30px,4.5vw,46px);font-weight:700;letter-spacing:.04em;line-height:1.1;color:#fff}
.hero-title span{display:block;background:linear-gradient(135deg,var(--gold-light) 0%,var(--gold) 60%,var(--gold-dim) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{font-size:10px;font-weight:700;letter-spacing:.22em;color:rgba(255,255,255,.45);text-transform:uppercase;margin-top:6px}
.hero-stat{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.stat-num{font-family:"Cormorant Garamond",serif;font-size:36px;font-weight:700;color:var(--gold-light);line-height:1}
.stat-label{font-size:10px;font-weight:700;letter-spacing:.14em;color:rgba(255,255,255,.45);text-transform:uppercase}

/* ── Page body ── */
.page-body{position:relative;z-index:1;padding:32px 40px;display:flex;flex-direction:column;gap:28px}

/* ── Add section ── */
.add-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:hidden}
.add-card-head{padding:20px 24px 0;display:flex;flex-direction:column;gap:14px}
.add-card-title{font-size:11px;font-weight:800;letter-spacing:.18em;color:var(--muted);text-transform:uppercase}

/* Mode toggle */
.mode-toggle{display:flex;gap:0;border:1.5px solid var(--border);border-radius:10px;overflow:hidden;width:fit-content}
.mode-btn{font-family:"Montserrat",sans-serif;font-size:12px;font-weight:800;letter-spacing:.10em;text-transform:uppercase;padding:10px 22px;border:none;background:none;color:var(--muted);cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:7px}
.mode-btn.active{background:var(--navy);color:var(--gold-light)}
.mode-btn:first-child{border-right:1.5px solid var(--border)}

/* Panels */
.add-panel{padding:20px 24px 24px;display:flex;flex-direction:column;gap:18px}
.field-group{display:flex;flex-direction:column;gap:7px}
.field-label{font-size:11px;font-weight:800;letter-spacing:.12em;color:var(--muted);text-transform:uppercase}
.field-sub{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.03em;margin-top:-3px}
.lux-input{width:100%;padding:11px 14px;font-family:"Montserrat",sans-serif;font-size:13px;font-weight:700;color:var(--navy-text);background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;outline:none;transition:border-color .2s,box-shadow .2s}
.lux-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,151,58,.15)}
.lux-select{-webkit-appearance:none;appearance:none;cursor:pointer}
.select-wrap{position:relative}
.select-wrap::after{content:"▾";position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--gold);font-size:13px;pointer-events:none;font-weight:700}

/* Employee chip grid */
.chip-grid{display:flex;flex-wrap:wrap;gap:8px;padding:4px 0}
.emp-chip{font-family:"Montserrat",sans-serif;font-size:12px;font-weight:700;letter-spacing:.04em;padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;transition:all .15s;user-select:none;-webkit-user-select:none}
.emp-chip:hover{border-color:var(--gold-border);color:var(--navy-text)}
.emp-chip.selected{background:var(--navy);border-color:var(--navy);color:var(--gold-light);box-shadow:0 2px 8px rgba(15,32,68,.22)}
.chip-hint{font-size:11px;font-weight:600;color:var(--muted);font-style:italic}

/* Date row (by-name mode) */
.date-rows{display:flex;flex-direction:column;gap:8px}
.date-row{display:flex;align-items:center;gap:8px}
.date-row .lux-input{flex:1}
.date-row-del{background:none;border:1.5px solid var(--border);color:var(--muted);border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0;transition:all .15s}
.date-row-del:hover{border-color:var(--leave-dot);color:var(--leave-dot)}
.add-date-btn{background:none;border:1.5px dashed var(--border);color:var(--muted);font-family:"Montserrat",sans-serif;font-size:12px;font-weight:700;letter-spacing:.07em;padding:9px 16px;border-radius:8px;cursor:pointer;transition:all .15s;align-self:flex-start}
.add-date-btn:hover{border-color:var(--gold);color:var(--gold)}

/* Submit button */
.submit-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.lux-btn{font-family:"Montserrat",sans-serif;font-size:12px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:#fff;background:linear-gradient(135deg,var(--navy2),var(--navy));border:1px solid var(--gold-border);border-radius:10px;padding:13px 36px;cursor:pointer;transition:box-shadow .22s,transform .18s;box-shadow:0 4px 16px rgba(15,32,68,.22)}
.lux-btn:hover{box-shadow:0 6px 24px rgba(15,32,68,.34),0 0 0 1px var(--gold-border);transform:translateY(-1px)}
.lux-btn:active{transform:translateY(0)}
.lux-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.result-msg{font-size:12px;font-weight:700;color:var(--gold-dim);letter-spacing:.04em}

/* ── Records section ── */
.records-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm)}
.records-head{padding:18px 24px;display:flex;align-items:center;flex-wrap:wrap;gap:12px;border-bottom:1.5px solid var(--border)}
.records-title{font-size:11px;font-weight:800;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;flex:1 1 auto}
.view-toggle{display:flex;gap:0;border:1.5px solid var(--border);border-radius:8px;overflow:hidden}
.vt-btn{font-family:"Montserrat",sans-serif;font-size:11px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;padding:7px 16px;border:none;background:none;color:var(--muted);cursor:pointer;transition:all .15s}
.vt-btn.active{background:var(--navy2);color:var(--gold-light)}
.vt-btn:first-child{border-right:1.5px solid var(--border)}
.filter-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:14px 24px;border-bottom:1.5px solid var(--border)}
.filter-input{padding:8px 12px;font-family:"Montserrat",sans-serif;font-size:12px;font-weight:700;color:var(--navy-text);background:var(--surface2);border:1.5px solid var(--border);border-radius:7px;outline:none;transition:border-color .2s}
.filter-input:focus{border-color:var(--gold)}
.filter-label{font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap}
.clear-filter-btn{font-family:"Montserrat",sans-serif;font-size:11px;font-weight:700;padding:7px 14px;border:1.5px solid var(--border);border-radius:7px;background:none;color:var(--muted);cursor:pointer;transition:all .15s}
.clear-filter-btn:hover{border-color:var(--gold);color:var(--gold)}
.records-body{padding:16px 24px;display:flex;flex-direction:column;gap:12px;min-height:100px}
.records-empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;font-style:italic}

/* Leave group card */
.leave-group{background:var(--leave-bg);border:1.5px solid var(--leave-border);border-radius:10px;overflow:hidden}
.leave-group-head{padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--leave-border)}
.leave-dot{width:8px;height:8px;border-radius:50%;background:var(--leave-dot);flex-shrink:0}
.leave-group-date{font-size:13px;font-weight:800;color:var(--navy-text);letter-spacing:.04em;flex:1}
.leave-group-day{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
.leave-group-count{font-size:11px;font-weight:800;color:var(--leave-dot);background:rgba(239,68,68,.1);padding:3px 10px;border-radius:12px;letter-spacing:.05em}
.leave-rows{padding:10px 16px;display:flex;flex-direction:column;gap:6px}
.leave-row{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:7px;transition:background .15s}
.leave-row:hover{background:rgba(239,68,68,.06)}
.leave-row-name{font-size:13px;font-weight:700;color:var(--navy-text);letter-spacing:.03em;flex:1}
.leave-row-date{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.03em;flex:1}
.del-btn{background:none;border:1.5px solid rgba(239,68,68,.3);color:var(--leave-dot);border-radius:6px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;flex-shrink:0;transition:all .15s}
.del-btn:hover{background:rgba(239,68,68,.12);border-color:var(--leave-dot)}

/* ── Loading / Modal / Toast ── */
.loading-overlay{position:fixed;inset:0;z-index:400;background:rgba(10,20,45,.6);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center}
.loading-overlay.show{display:flex}
.lux-spinner{width:46px;height:46px;position:relative}
.lux-spinner::before,.lux-spinner::after{content:"";position:absolute;inset:0;border-radius:50%}
.lux-spinner::before{border:3px solid rgba(212,174,86,.2)}
.lux-spinner::after{border:3px solid transparent;border-top-color:var(--gold-light);border-right-color:var(--gold);animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Dark mode ── */
body.dark-mode{
  --bg:#0a0a0a;--surface:#111;--surface2:#1a1a1a;--surface3:#222;
  --navy:#0d0d0d;--navy2:#141414;--navy-text:#f0e6cc;
  --gold:#d4ae56;--gold-light:#e8c96a;--gold-dim:#b8973a;
  --muted:#8a7a5a;--border:#2a2a2a;--gold-border:rgba(212,174,86,.4);
  --leave-bg:rgba(239,68,68,.06);--leave-border:rgba(239,68,68,.25);
  --shadow-sm:0 2px 12px rgba(0,0,0,.4);--shadow-md:0 6px 28px rgba(0,0,0,.55);
}
body.dark-mode .topbar{background:#080808}
body.dark-mode .hero{background:linear-gradient(135deg,#080808 0%,#111 100%)}
body.dark-mode .add-card,.body.dark-mode .records-card{background:#111;border-color:#252525}
body.dark-mode .lux-input,.body.dark-mode .filter-input{background:#1a1a1a;color:#f0e6cc;border-color:#303030}
body.dark-mode .emp-chip{background:#1a1a1a;border-color:#2a2a2a;color:#8a8a8a}
body.dark-mode .emp-chip.selected{background:var(--navy2);color:var(--gold-light)}
body.dark-mode .leave-row-name{color:#f0e6cc}
body.dark-mode .lux-btn{color:var(--gold-light);border-color:rgba(212,174,86,.45)}

/* ── Mobile ── */
@media(max-width:640px){
  .topbar{padding-left:16px;padding-right:16px}
  .hero{padding:24px 16px 18px}
  .page-body{padding:18px 16px;gap:20px}
  .add-card-head{padding:16px 16px 0}
  .add-panel{padding:16px 16px 18px}
  .records-head{padding:14px 16px}
  .records-body{padding:12px 16px}
  .filter-bar{padding:10px 16px}
  .leave-rows{padding:8px 12px}
  .mode-btn{padding:10px 16px;font-size:11px}
  .lux-btn{padding:12px 24px}
  .topbar-right .datetime-badge{display:none}
}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--gold);border-radius:4px}
</style>
</head>
<body class="dark-mode">

<header class="topbar">
  <a href="/" class="topbar-brand">&#11041; APPACHI JEWELLERY</a>
  <div class="topbar-right">
    <a href="/" class="back-btn">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Dashboard
    </a>
    <div class="datetime-badge" id="date-time">&mdash;</div>
    <button class="theme-btn" id="pwa-install-btn" onclick="installApp()" title="Install app" style="display:none">&#128242;</button>
    <button class="theme-btn" id="notif-btn" onclick="toggleNotifications()" title="Notifications">&#128276;</button>
    <button class="theme-btn" id="themeToggle" onclick="toggleTheme()" title="Toggle theme">&#9728;</button>
  </div>
</header>

<section class="hero">
  <div>
    <div class="hero-title">Leave <span>Management</span></div>
    <div class="hero-sub">Track &amp; manage staff absences</div>
  </div>
  <div class="hero-stat">
    <div class="stat-num" id="stat-today">—</div>
    <div class="stat-label">On leave today</div>
  </div>
</section>

<div class="page-body">

  <!-- ── ADD LEAVE CARD ── -->
  <div class="add-card">
    <div class="add-card-head">
      <div class="add-card-title">Record Leave</div>
      <div class="mode-toggle">
        <button class="mode-btn active" id="btn-by-date" onclick="setMode('date')">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          By Date
        </button>
        <button class="mode-btn" id="btn-by-name" onclick="setMode('name')">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          By Employee
        </button>
      </div>
    </div>

    <!-- By Date panel -->
    <div class="add-panel" id="panel-date">
      <div class="field-group">
        <div class="field-label">Date</div>
        <input type="date" id="leave-date" class="lux-input" style="max-width:220px"/>
      </div>
      <div class="field-group">
        <div class="field-label">Employees on leave</div>
        <div class="field-sub">Tap names to select / deselect</div>
        <div class="chip-grid" id="chip-grid">
          <span class="chip-hint">Loading employees…</span>
        </div>
      </div>
      <div class="submit-row">
        <button class="lux-btn" onclick="addByDate()" id="btn-add-date">Record Leaves</button>
        <span class="result-msg" id="msg-date"></span>
      </div>
    </div>

    <!-- By Name panel -->
    <div class="add-panel" id="panel-name" style="display:none">
      <div class="field-group">
        <div class="field-label">Employee</div>
        <div class="select-wrap" style="max-width:280px">
          <select id="leave-emp" class="lux-input lux-select">
            <option value="">— Select employee —</option>
          </select>
        </div>
      </div>
      <div class="field-group">
        <div class="field-label">Leave Dates</div>
        <div class="date-rows" id="date-rows">
          <!-- date row template added by JS -->
        </div>
        <button class="add-date-btn" onclick="addDateRow()">+ Add another date</button>
      </div>
      <div class="submit-row">
        <button class="lux-btn" onclick="addByName()" id="btn-add-name">Record Leaves</button>
        <span class="result-msg" id="msg-name"></span>
      </div>
    </div>
  </div>

  <!-- ── RECORDS CARD ── -->
  <div class="records-card">
    <div class="records-head">
      <div class="records-title">All Leave Records</div>
      <div class="view-toggle">
        <button class="vt-btn active" id="vt-date" onclick="setView('date')">By Date</button>
        <button class="vt-btn" id="vt-emp" onclick="setView('emp')">By Employee</button>
      </div>
    </div>
    <div class="filter-bar">
      <span class="filter-label">From</span>
      <input type="date" id="filter-from" class="filter-input" onchange="renderRecords()"/>
      <span class="filter-label">To</span>
      <input type="date" id="filter-to" class="filter-input" onchange="renderRecords()"/>
      <span class="filter-label">Search</span>
      <input type="text" id="filter-search" class="filter-input" placeholder="Name…" oninput="renderRecords()" style="max-width:140px"/>
      <button class="clear-filter-btn" onclick="clearFilters()">Clear</button>
    </div>
    <div class="records-body" id="records-body">
      <div class="records-empty">Loading…</div>
    </div>
  </div>
</div>

<!-- Loading overlay -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="lux-spinner"></div>
</div>

<script>
/* ══════════════════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════════════════ */
let allEmployees = [];
let allLeaves    = [];
let currentMode  = 'date';
let currentView  = 'date';
let selectedEmps = new Set(); // for by-date mode

/* ══════════════════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════════════════ */
async function init() {
  // Default date = today
  const today = new Date().toLocaleDateString('en-CA');
  document.getElementById('leave-date').value = today;
  setDefaultFilters();

  try {
    const [emps, leaves] = await Promise.all([
      fetch('/api/employees').then(r => r.json()),
      fetch('/api/leaves').then(r => r.json()),
    ]);
    allEmployees = emps;
    allLeaves    = leaves;
    buildChipGrid();
    buildEmpDropdown();
    addDateRow();  // initial date row for by-name mode
    updateTodayStat();
    renderRecords();
  } catch (e) {
    console.error('Init error:', e);
  }
}

function setDefaultFilters() {
  const now   = new Date();
  const past  = new Date(now); past.setDate(past.getDate() - 14);
  const future= new Date(now); future.setDate(future.getDate() + 60);
  document.getElementById('filter-from').value = past.toLocaleDateString('en-CA');
  document.getElementById('filter-to').value   = future.toLocaleDateString('en-CA');
}

function updateTodayStat() {
  const today = new Date().toLocaleDateString('en-CA');
  const n = allLeaves.filter(l => l.date === today).length;
  document.getElementById('stat-today').textContent = n;
}

/* ══════════════════════════════════════════════════════════════════
   MODE SWITCH
══════════════════════════════════════════════════════════════════ */
function setMode(mode) {
  currentMode = mode;
  document.getElementById('panel-date').style.display = mode === 'date' ? '' : 'none';
  document.getElementById('panel-name').style.display = mode === 'name' ? '' : 'none';
  document.getElementById('btn-by-date').classList.toggle('active', mode === 'date');
  document.getElementById('btn-by-name').classList.toggle('active', mode === 'name');
}

/* ══════════════════════════════════════════════════════════════════
   BY DATE — chip grid
══════════════════════════════════════════════════════════════════ */
function buildChipGrid() {
  const grid = document.getElementById('chip-grid');
  grid.innerHTML = '';
  selectedEmps.clear();

  allEmployees.forEach(emp => {
    const alias = emp.alias_name || emp.name;
    const chip  = document.createElement('div');
    chip.className = 'emp-chip';
    chip.textContent = alias;
    chip.dataset.alias = alias;
    chip.addEventListener('click', () => toggleChip(chip, alias));
    grid.appendChild(chip);
  });

  if (!allEmployees.length) {
    grid.innerHTML = '<span class="chip-hint">No employees found.</span>';
  }
}

function toggleChip(chip, alias) {
  if (selectedEmps.has(alias)) {
    selectedEmps.delete(alias);
    chip.classList.remove('selected');
  } else {
    selectedEmps.add(alias);
    chip.classList.add('selected');
  }
}

function clearChipSelection() {
  selectedEmps.clear();
  document.querySelectorAll('#chip-grid .emp-chip').forEach(c => c.classList.remove('selected'));
}

/* ══════════════════════════════════════════════════════════════════
   BY NAME — employee dropdown + date rows
══════════════════════════════════════════════════════════════════ */
function buildEmpDropdown() {
  const sel = document.getElementById('leave-emp');
  allEmployees.forEach(emp => {
    const alias  = emp.alias_name || emp.name;
    const option = document.createElement('option');
    option.value       = alias;
    option.textContent = alias;
    sel.appendChild(option);
  });
}

function addDateRow(defaultVal = '') {
  const rows = document.getElementById('date-rows');
  const row  = document.createElement('div');
  row.className = 'date-row';
  const input = document.createElement('input');
  input.type  = 'date';
  input.className  = 'lux-input leave-date-input';
  input.value = defaultVal || new Date().toLocaleDateString('en-CA');
  const del = document.createElement('button');
  del.className   = 'date-row-del';
  del.innerHTML   = '&times;';
  del.title       = 'Remove';
  del.onclick     = () => {
    if (document.querySelectorAll('#date-rows .date-row').length > 1) row.remove();
  };
  row.appendChild(input);
  row.appendChild(del);
  rows.appendChild(row);
}

/* ══════════════════════════════════════════════════════════════════
   SUBMIT — By Date
══════════════════════════════════════════════════════════════════ */
async function addByDate() {
  const date    = document.getElementById('leave-date').value;
  const aliases = [...selectedEmps];

  if (!date)          { showMsg('msg-date', '⚠ Select a date'); return; }
  if (!aliases.length){ showMsg('msg-date', '⚠ Select at least one employee'); return; }

  showLoading(true);
  try {
    const r = await fetch('/api/leaves', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ date, aliases }),
    }).then(r => r.json());

    if (r.error) { showMsg('msg-date', '✕ ' + r.error); return; }

    showMsg('msg-date', `✓ ${r.inserted} leave${r.inserted !== 1 ? 's' : ''} recorded${r.skipped ? ` (${r.skipped} already existed)` : ''}`);
    clearChipSelection();
    await refreshLeaves();
  } catch (e) {
    showMsg('msg-date', '✕ Error: ' + e.message);
  } finally {
    showLoading(false);
  }
}

/* ══════════════════════════════════════════════════════════════════
   SUBMIT — By Name
══════════════════════════════════════════════════════════════════ */
async function addByName() {
  const alias = document.getElementById('leave-emp').value;
  const dates = [...document.querySelectorAll('#date-rows .leave-date-input')]
    .map(i => i.value.trim()).filter(Boolean);

  if (!alias) { showMsg('msg-name', '⚠ Select an employee'); return; }
  if (!dates.length){ showMsg('msg-name', '⚠ Add at least one date'); return; }

  showLoading(true);
  try {
    const r = await fetch('/api/leaves', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ alias, dates }),
    }).then(r => r.json());

    if (r.error) { showMsg('msg-name', '✕ ' + r.error); return; }

    showMsg('msg-name', `✓ ${r.inserted} leave${r.inserted !== 1 ? 's' : ''} recorded${r.skipped ? ` (${r.skipped} already existed)` : ''}`);
    // Reset date rows to single empty row
    document.getElementById('date-rows').innerHTML = '';
    addDateRow();
    await refreshLeaves();
  } catch (e) {
    showMsg('msg-name', '✕ Error: ' + e.message);
  } finally {
    showLoading(false);
  }
}

/* ══════════════════════════════════════════════════════════════════
   DELETE LEAVE
══════════════════════════════════════════════════════════════════ */
async function deleteLeave(id, btn) {
  btn.disabled = true;
  try {
    await fetch(`/api/leaves/${id}`, { method: 'DELETE' });
    await refreshLeaves();
  } catch (e) {
    btn.disabled = false;
    console.error('Delete error:', e);
  }
}

/* ══════════════════════════════════════════════════════════════════
   REFRESH
══════════════════════════════════════════════════════════════════ */
async function refreshLeaves() {
  allLeaves = await fetch('/api/leaves').then(r => r.json());
  updateTodayStat();
  renderRecords();
}

/* ══════════════════════════════════════════════════════════════════
   VIEW SWITCH
══════════════════════════════════════════════════════════════════ */
function setView(view) {
  currentView = view;
  document.getElementById('vt-date').classList.toggle('active', view === 'date');
  document.getElementById('vt-emp').classList.toggle('active', view === 'emp');
  renderRecords();
}

/* ══════════════════════════════════════════════════════════════════
   FILTERS
══════════════════════════════════════════════════════════════════ */
function clearFilters() {
  setDefaultFilters();
  document.getElementById('filter-search').value = '';
  renderRecords();
}

/* ══════════════════════════════════════════════════════════════════
   RENDER RECORDS
══════════════════════════════════════════════════════════════════ */
function renderRecords() {
  const from   = document.getElementById('filter-from').value;
  const to     = document.getElementById('filter-to').value;
  const search = document.getElementById('filter-search').value.trim().toLowerCase();
  const body   = document.getElementById('records-body');

  let filtered = allLeaves.filter(l => {
    if (from && l.date < from) return false;
    if (to   && l.date > to)   return false;
    if (search && !l.emp_alias.toLowerCase().includes(search)) return false;
    return true;
  });

  if (!filtered.length) {
    body.innerHTML = '<div class="records-empty">No leave records found for the selected filters.</div>';
    return;
  }

  if (currentView === 'date') {
    renderByDate(filtered, body);
  } else {
    renderByEmp(filtered, body);
  }
}

function fmtDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

function fmtDay(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-GB', { weekday: 'long' });
}

function renderByDate(rows, body) {
  // Group by date (sorted desc)
  const map = new Map();
  rows.forEach(l => {
    if (!map.has(l.date)) map.set(l.date, []);
    map.get(l.date).push(l);
  });
  const sortedDates = [...map.keys()].sort((a, b) => b.localeCompare(a));

  body.innerHTML = '';
  sortedDates.forEach(date => {
    const entries = map.get(date);
    const today   = new Date().toLocaleDateString('en-CA');
    const isToday = date === today;

    const group = document.createElement('div');
    group.className = 'leave-group';
    group.innerHTML = `
      <div class="leave-group-head">
        <div class="leave-dot" ${isToday ? 'style="animation:glow-dot 1.5s infinite"' : ''}></div>
        <div class="leave-group-date">${fmtDate(date)}${isToday ? '  <span style="color:var(--leave-dot);font-size:10px;letter-spacing:.08em">TODAY</span>' : ''}</div>
        <div class="leave-group-day">${fmtDay(date)}</div>
        <div class="leave-group-count">${entries.length} on leave</div>
      </div>
      <div class="leave-rows">
        ${entries.map(l => `
          <div class="leave-row">
            <div class="leave-row-name">${escHtml(l.emp_alias)}</div>
            <button class="del-btn" onclick="deleteLeave(${l.id}, this)" title="Remove leave">&times;</button>
          </div>`).join('')}
      </div>`;
    body.appendChild(group);
  });
}

function renderByEmp(rows, body) {
  // Group by employee (sorted alpha)
  const map = new Map();
  rows.forEach(l => {
    if (!map.has(l.emp_alias)) map.set(l.emp_alias, []);
    map.get(l.emp_alias).push(l);
  });
  const sortedEmps = [...map.keys()].sort();

  body.innerHTML = '';
  sortedEmps.forEach(alias => {
    const entries = map.get(alias).sort((a, b) => b.date.localeCompare(a.date));
    const group = document.createElement('div');
    group.className = 'leave-group';
    group.innerHTML = `
      <div class="leave-group-head">
        <div class="leave-dot"></div>
        <div class="leave-group-date">${escHtml(alias)}</div>
        <div class="leave-group-count">${entries.length} day${entries.length !== 1 ? 's' : ''}</div>
      </div>
      <div class="leave-rows">
        ${entries.map(l => `
          <div class="leave-row">
            <div class="leave-row-date">${fmtDate(l.date)} &nbsp;<span style="font-size:11px;color:var(--muted)">${fmtDay(l.date)}</span></div>
            <button class="del-btn" onclick="deleteLeave(${l.id}, this)" title="Remove leave">&times;</button>
          </div>`).join('')}
      </div>`;
    body.appendChild(group);
  });
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ══════════════════════════════════════════════════════════════════
   UI HELPERS
══════════════════════════════════════════════════════════════════ */
function showLoading(on) {
  document.getElementById('loadingOverlay').classList.toggle('show', on);
}

function showMsg(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.textContent = ''; }, 4000);
}

/* ══════════════════════════════════════════════════════════════════
   DATETIME
══════════════════════════════════════════════════════════════════ */
function updateDatetime() {
  const now  = new Date();
  const date = now.toLocaleDateString('en-GB', { day:'2-digit', month:'2-digit', year:'numeric' });
  let h = now.getHours(), m = now.getMinutes();
  const ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  document.getElementById('date-time').textContent =
    date + '  ·  ' + h + ':' + String(m).padStart(2,'0') + ' ' + ap;
}
updateDatetime();
setInterval(updateDatetime, 30000);

/* ══════════════════════════════════════════════════════════════════
   THEME
══════════════════════════════════════════════════════════════════ */
function toggleTheme() {
  document.body.classList.toggle('dark-mode');
  document.getElementById('themeToggle').innerHTML =
    document.body.classList.contains('dark-mode') ? '&#9728;' : '&#9790;';
}

/* ── glow-dot animation ── */
const style = document.createElement('style');
style.textContent = '@keyframes glow-dot{0%,100%{opacity:.6}50%{opacity:1;box-shadow:0 0 6px var(--leave-dot)}}';
document.head.appendChild(style);

init();
</script>
