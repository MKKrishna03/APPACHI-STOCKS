<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#b8973a"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="APPACHI"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icons/icon-192.png"/>
<title>Dashboard · APPACHI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --panel: #131922;
    --panel-elev: #1a2230;
    --border: #222d3d;
    --text: #e6edf3;
    --text-dim: #8b98a8;
    --accent: #d4af37;
    --up: #2ecc71;
    --down: #ff5d5d;
    --sidebar-w: 240px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    min-height: 100vh;
  }

  /* ---------- Sidebar ---------- */
  .sidebar {
    background: var(--panel);
    border-right: 1px solid var(--border);
    padding: 24px 18px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px 6px 18px 6px;
    border-bottom: 1px solid var(--border);
  }

  .brand-mark {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    background: linear-gradient(135deg, var(--accent), #9c7c1a);
    display: grid;
    place-items: center;
    font-family: 'Fraunces', serif;
    font-weight: 800;
    color: #0d1117;
  }

  .brand-name {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 18px;
    letter-spacing: 0.3px;
  }

  .nav-section {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .nav-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-dim);
    padding: 6px 10px;
  }

  /* Empty placeholder list (no items) */
  .nav-empty {
    padding: 18px 10px;
    border: 1px dashed var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    font-size: 12px;
    text-align: center;
    font-style: italic;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-dim);
    text-decoration: none;
    transition: background 0.15s, color 0.15s;
    cursor: pointer;
  }

  .nav-item:hover {
    background: var(--panel-elev);
    color: var(--text);
  }

  .nav-item.active {
    background: var(--panel-elev);
    color: var(--accent);
  }

  .nav-item svg {
    flex-shrink: 0;
    opacity: 0.7;
  }

  .nav-item:hover svg,
  .nav-item.active svg {
    opacity: 1;
  }

  .sidebar-footer {
    margin-top: auto;
    font-size: 11px;
    color: var(--text-dim);
    padding: 10px;
    border-top: 1px solid var(--border);
  }

  /* ---------- Main ---------- */
  .main {
    display: flex;
    flex-direction: column;
  }

  .topbar {
    height: 64px;
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--panel);
  }

  .page-title {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 600;
  }

  .topbar-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
  }

  .content {
    flex: 1;
    padding: 32px;
    display: grid;
    place-items: center;
  }

  .empty-state {
    text-align: center;
    color: var(--text-dim);
    max-width: 420px;
  }

  .empty-state .ticker {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 12px;
  }

  .empty-state h2 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 28px;
    color: var(--text);
    margin-bottom: 10px;
  }

  .empty-state p {
    font-size: 14px;
    line-height: 1.6;
  }

  @media (max-width: 720px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { display: none; }
  }
</style>
</head>
<body>
  <div class="app">
    <!-- Sidebar (empty) -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">S</div>
        <div class="brand-name">Stocks</div>
      </div>

      <div class="nav-section">
        <div class="nav-label">Manage</div>
        <a href="/employees.html" class="nav-item">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>

            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>

            <line x1="3" y1="9" x2="21" y2="9"/>

        <a href="/entry.html" class="nav-item">

            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
          Entry
        </a>
        <a href="/auto-assign.html" class="nav-item">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>

          </svg>

        <a href="/leaves.html" class="nav-item">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>

            <line x1="8" y1="18" x2="13" y2="18"/>
          </svg>
          Leaves
        </a>
      </div>

      <div class="nav-section">
        <div class="nav-label">Watchlist</div>
        <div class="nav-empty">No items yet</div>
      </div>

      <div class="nav-section">
        <div class="nav-label">Portfolio</div>
        <div class="nav-empty">No items yet</div>
      </div>

      <div class="sidebar-footer">v0.1 · APPACHI</div>
    </aside>

    <!-- Main (empty) -->
    <main class="main">
      <header class="topbar">
        <div class="page-title">Dashboard</div>
        <div class="topbar-meta">— · — · —</div>
      </header>

      <section class="content">
        <div class="empty-state">
          <div class="ticker">— EMPTY —</div>
          <h2>Nothing here yet</h2>
          <p>Your dashboard is ready. Add tickers, watchlists, and portfolio data to start tracking the markets.</p>
        </div>
      </section>
    </main>
  </div>
<script src="/pwa.js" defer></script>
</body>
</html>
