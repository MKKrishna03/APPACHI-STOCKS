<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
<meta name="theme-color" content="#0d1117"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="APPACHI"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icons/icon-192.png"/>
<title>Dashboard · APPACHI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d1117; --panel:#131922; --panel-elev:#1a2230;
  --border:#222d3d; --text:#e6edf3; --text-dim:#8b98a8;
  --accent:#d4af37; --accent2:#9c7c1a; --up:#2ecc71; --down:#ff5d5d;
  --sidebar-w:240px; --nav-h:64px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;overflow-y:scroll;font-size:clamp(14px,1.6vw,16px)}
body{min-height:100%;width:100%;overflow-x:hidden;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}

/* ═══════════════════════════════════════
   DESKTOP LAYOUT
═══════════════════════════════════════ */
.app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;min-height:100vh}

/* ── Desktop Sidebar ── */
.sidebar{background:var(--panel);border-right:1px solid var(--border);padding:24px 18px;display:flex;flex-direction:column;gap:20px;position:sticky;top:0;height:100vh;overflow-y:auto}
.brand{display:flex;align-items:center;gap:10px;padding:4px 6px 18px 6px;border-bottom:1px solid var(--border);text-decoration:none}
.brand-mark{width:28px;height:28px;border-radius:6px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:grid;place-items:center;font-family:'Fraunces',serif;font-weight:800;color:#0d1117;flex-shrink:0}
.brand-name{font-family:'Fraunces',serif;font-weight:600;font-size:18px;letter-spacing:.3px;color:var(--text)}
.nav-section{display:flex;flex-direction:column;gap:4px}
.nav-label{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-dim);padding:6px 10px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;font-size:14px;font-weight:500;color:var(--text-dim);text-decoration:none;transition:background .15s,color .15s;cursor:pointer;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--panel-elev);color:var(--text)}
.nav-item svg{flex-shrink:0;opacity:.7}
.nav-item:hover svg{opacity:1}
.sidebar-footer{margin-top:auto;font-size:11px;color:var(--text-dim);padding:10px;border-top:1px solid var(--border)}

/* ── Desktop topbar ── */
.main{display:flex;flex-direction:column;min-height:100vh}
.desktop-topbar{height:64px;border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;background:var(--panel);flex-shrink:0}
.page-title{font-family:'Fraunces',serif;font-size:20px;font-weight:600}
.topbar-meta{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-dim)}

/* ── Content area ── */
.content{flex:1;padding:24px 28px;display:flex;flex-direction:column;gap:24px;overflow-y:auto}

/* ── Blocks ── */
.dash-block{display:flex;flex-direction:column;gap:12px}
.block-header{display:flex;align-items:center;justify-content:space-between}
.block-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-dim)}
.refresh-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;color:var(--text-dim);font-size:11px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent)}
.refresh-btn svg{transition:transform .4s}
.refresh-btn.spinning svg{animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Day grid (desktop = 2col, mobile = 1col) ── */
.day-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.day-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px 18px}
.day-card-title{font-family:'Fraunces',serif;font-size:13px;font-weight:600;color:var(--accent);margin-bottom:12px}
.chip-list{display:flex;flex-direction:column;gap:6px}
.chip{padding:8px 12px;background:var(--panel-elev);border-radius:8px;font-size:13px;font-weight:500;color:var(--text);border-left:3px solid var(--accent);line-height:1.3}
.chip-none{font-size:12px;color:var(--text-dim);font-style:italic;padding:4px 2px}

/* ── Team rows ── */
.team-row{display:grid;grid-template-columns:1fr 1fr;align-items:center;padding:8px 10px;border-radius:7px;font-size:12px;gap:6px}
.team-row:nth-child(odd){background:var(--panel-elev)}
.team-stock{color:var(--text-dim);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.team-names{color:var(--text);font-weight:600;text-align:right;word-break:break-word}

/* ── Tabs (team section on mobile) ── */
.team-tabs{display:none;gap:0;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.team-tab{padding:7px 16px;background:none;border:none;color:var(--text-dim);font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.team-tab.active{background:var(--panel-elev);color:var(--accent)}
.team-panel{display:block}

/* ── Leave banner ── */
.leave-banner{background:rgba(212,175,55,.08);border:1px solid rgba(212,175,55,.25);border-radius:10px;padding:12px 16px;font-size:13px;font-weight:500;color:var(--accent);display:none;align-items:center;gap:10px}
.leave-banner.show{display:flex}

/* ── Skeleton loader ── */
.skel{background:linear-gradient(90deg,var(--panel-elev) 25%,var(--border) 50%,var(--panel-elev) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px;height:34px;margin-bottom:6px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ═══════════════════════════════════════
   MOBILE HEADER (hidden on desktop)
═══════════════════════════════════════ */
.mobile-header{display:none;background:var(--panel);border-bottom:1px solid var(--border);padding:calc(env(safe-area-inset-top,0px) + 12px) 18px 12px;flex-direction:column;gap:2px;position:sticky;top:0;z-index:100}
.mh-top{display:flex;align-items:center;justify-content:space-between}
.mh-brand{font-family:'Fraunces',serif;font-weight:800;font-size:17px;color:var(--accent);letter-spacing:.04em}
.mh-actions{display:flex;align-items:center;gap:8px}
.mh-icon-btn{background:none;border:1px solid var(--border);border-radius:8px;width:36px;height:36px;display:grid;place-items:center;color:var(--text-dim);cursor:pointer;transition:all .15s;flex-shrink:0}
.mh-icon-btn:hover,.mh-icon-btn:active{border-color:var(--accent);color:var(--accent)}
.mh-name{font-size:13px;font-weight:600;color:var(--text)}
.mh-date{font-size:12px;color:var(--text-dim);font-family:'JetBrains Mono',monospace}

/* ── Greeting card (mobile) ── */
.greeting-card{display:none;background:linear-gradient(135deg,var(--panel) 0%,var(--panel-elev) 100%);border:1px solid var(--border);border-radius:14px;padding:18px 20px}
.greet-text{font-family:'Fraunces',serif;font-size:20px;font-weight:600;color:var(--text);margin-bottom:2px}
.greet-sub{font-size:13px;color:var(--text-dim)}

/* ═══════════════════════════════════════
   MOBILE BOTTOM NAV (hidden on desktop)
═══════════════════════════════════════ */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--panel);border-top:1px solid var(--border);padding:8px 0 calc(8px + env(safe-area-inset-bottom,0px));box-shadow:0 -4px 20px rgba(0,0,0,.4)}
.mnav-inner{display:flex;justify-content:space-around;align-items:center}
.mnav-btn{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:4px;padding:4px 12px;cursor:pointer;color:var(--text-dim);transition:color .15s;-webkit-tap-highlight-color:transparent;min-width:60px}
.mnav-btn:active{opacity:.7}
.mnav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.mnav-btn span{font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.mnav-btn.danger{color:var(--down);opacity:.7}
.mnav-btn.accent-btn{color:var(--accent)}

/* ── Mobile content spacing ── */
.mobile-scroll-pad{display:none;height:80px;flex-shrink:0}

/* ═══════════════════════════════════════
   MOBILE BREAKPOINT
═══════════════════════════════════════ */
@media(max-width:1024px){
  .app{display:block;min-height:100vh}
  .sidebar{display:none!important}
  .main{min-height:100dvh;display:flex;flex-direction:column}
  .desktop-topbar{display:none}
  /* ── Mobile header ── */
  .mobile-header{display:flex;padding:calc(env(safe-area-inset-top,0px) + 16px) 20px 14px}
  .mh-brand{font-size:22px}
  .mh-name{font-size:17px;margin-top:4px}
  .mh-date{font-size:14px;margin-top:2px}
  .mh-icon-btn{width:42px;height:42px;border-radius:10px}
  /* ── Greeting ── */
  .greeting-card{display:block;padding:22px 20px;border-radius:16px}
  .greet-text{font-size:24px}
  .greet-sub{font-size:15px}
  /* ── Content ── */
  .content{padding:18px;gap:20px;overflow-y:visible}
  .block-title{font-size:13px;letter-spacing:1.4px}
  /* ── Day cards ── */
  .day-grid{grid-template-columns:1fr}
  .day-card{border-radius:16px;padding:18px 20px}
  .day-card-title{font-size:16px;margin-bottom:14px}
  .chip{font-size:16px;padding:13px 16px;border-radius:10px}
  .chip-none{font-size:15px}
  /* ── Team rows ── */
  .team-tabs{display:flex}
  .team-row{font-size:15px;padding:14px 16px;border-radius:9px;gap:10px}
  .team-stock{font-size:14px;letter-spacing:.4px}
  .team-names{font-size:15px}
  /* ── Leave banner ── */
  .leave-banner{font-size:15px;padding:16px 18px;border-radius:14px}
  /* ── Bottom nav ── */
  .mobile-nav{display:block;padding:10px 0 calc(10px + env(safe-area-inset-bottom,0px))}
  .mnav-btn{min-width:54px;padding:6px 10px;gap:5px}
  .mnav-btn svg{width:26px;height:26px;stroke-width:1.6}
  .mnav-btn span{font-size:11px;letter-spacing:.05em}
  .mobile-scroll-pad{display:block;height:90px}
}

/* Extra safety: force-hide sidebar on any touch device regardless of viewport */
@media(hover:none) and (pointer:coarse){
  .sidebar{display:none!important}
  .app{display:block}
  .desktop-topbar{display:none}
  .mobile-header{display:flex}
  .mobile-nav{display:block}
  .mobile-scroll-pad{display:block}
}
</style>
</head>

<script src="/pwa.js" defer></script>
<script src="/push-native.js" defer></script>
<script src="/auth.js"></script>
<script>
const istFmt  = d => new Intl.DateTimeFormat('en-CA', { timeZone:'Asia/Kolkata' }).format(d);
const dayFmt  = s => new Date(s+'T12:00:00').toLocaleDateString('en-IN', { weekday:'long', day:'numeric', month:'short' });
const shortFmt= s => new Date(s+'T12:00:00').toLocaleDateString('en-IN', { weekday:'short', day:'numeric', month:'short' });

let _today, _tomorrow, _me;

// Team tab state (mobile only)
function switchTeam(day) {
  document.getElementById('tabToday').classList.toggle('active', day==='today');
  document.getElementById('tabTomorrow').classList.toggle('active', day==='tomorrow');
  document.getElementById('teamTodayCard').style.display    = day==='today' ? '' : 'none';
  document.getElementById('teamTomorrowCard').style.display = day==='tomorrow' ? '' : 'none';
}

// Only activate tab mode on mobile
function initTeamTabs() {
  if (window.innerWidth <= 720) {
    document.getElementById('teamTomorrowCard').style.display = 'none';
    document.getElementById('tabToday').classList.add('active');
  }
}

function greeting() {
  const h = new Date().getHours();
  if (h >= 5  && h < 12) return 'Good morning';
  if (h >= 12 && h < 17) return 'Good afternoon';
  if (h >= 17 && h < 21) return 'Good evening';
  return 'Good night';
}

function setSpinner(on) {
  ['refreshIconMobile','refreshIconDesktop'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.animation = on ? 'spin .6s linear infinite' : '';
  });
}

async function loadDashboard(forceRefresh) {
  if (!_me) return;
  setSpinner(true);

  _today    = istFmt(new Date());
  _tomorrow = istFmt(new Date(Date.now() + 86400000));

  // Update titles
  document.getElementById('dashDate').textContent         = dayFmt(_today);
  document.getElementById('mobileDateLine').textContent   = dayFmt(_today);
  document.getElementById('myTodayTitle').textContent     = 'Today — ' + shortFmt(_today);
  document.getElementById('myTomorrowTitle').textContent  = 'Tomorrow — ' + shortFmt(_tomorrow);
  document.getElementById('teamTodayTitle').textContent   = 'Today — ' + shortFmt(_today);
  document.getElementById('teamTomorrowTitle').textContent = 'Tomorrow — ' + shortFmt(_tomorrow);

  try {
    const [[todayData, tomorrowData], myLeaves] = await Promise.all([
      Promise.all([
        fetch('/api/entry/all?date='+_today).then(r=>r.json()).catch(()=>[]),
        fetch('/api/entry/all?date='+_tomorrow).then(r=>r.json()).catch(()=>[]),
      ]),
      fetch('/api/my-leaves').then(r=>r.json()).catch(()=>[]),
    ]);

    renderMine('myToday',    todayData,    _me.name);
    renderMine('myTomorrow', tomorrowData, _me.name);
    renderTeam('teamToday',    todayData);
    renderTeam('teamTomorrow', tomorrowData);
    showLeaveBanner(myLeaves);
  } catch(e) {
    console.error(e);
  } finally {
    setSpinner(false);
  }
}

function renderMine(id, data, alias) {
  const el = document.getElementById(id);
  if (!el) return;
  const mine = (data||[]).filter(s => Array.isArray(s.aliases) && s.aliases.includes(alias));
  el.innerHTML = mine.length
    ? mine.map(s=>`<div class="chip">${s.label}</div>`).join('')
    : '<span class="chip-none">No assignments saved yet</span>';
}

function renderTeam(id, data) {
  const el = document.getElementById(id);
  if (!el) return;
  if (!data||!data.length) { el.innerHTML='<span class="chip-none">No assignments saved yet</span>'; return; }
  el.innerHTML = data.map(s=>
    `<div class="team-row">
      <span class="team-stock">${s.label}</span>
      <span class="team-names">${(s.aliases||[]).join(', ')}</span>
    </div>`
  ).join('');
}

function showLeaveBanner(leaves) {
  const banner = document.getElementById('leaveBanner');
  const text   = document.getElementById('leaveBannerText');
  const msgs   = [];
  if (leaves.some(l=>l.date===_today))    msgs.push('You are on leave today');
  if (leaves.some(l=>l.date===_tomorrow)) msgs.push('You have leave booked for tomorrow');
  if (msgs.length) {
    text.textContent = msgs.join(' · ');
    banner.classList.add('show');
  } else {
    banner.classList.remove('show');
  }
}

// Boot: wait for auth.js, then load
(async () => {
  for (let i=0;i<30;i++) { if (window._authUser) break; await new Promise(r=>setTimeout(r,100)); }
  _me = window._authUser;
  if (!_me) return;

  // Hide Entry nav on native (Capacitor) app — Entry is web-only
  if (window.Capacitor?.isNativePlatform?.()) {
    document.getElementById('nav-entry-desktop')?.remove();
    document.getElementById('nav-entry-mobile')?.remove();
  }

  // Mobile header
  const _role = _me.role || 'STAFF';
  document.getElementById('mobileUserName').textContent = _me.name + (_role === 'COMPUTER' ? ' · Staff' : '');

  // Greeting
  const greet = document.getElementById('greetText');
  const sub   = document.getElementById('greetSub');
  if (greet) greet.textContent = greeting() + '!';
  if (sub)   sub.textContent   = 'Here are your assignments for today and tomorrow.';

  initTeamTabs();
  await loadDashboard();
  _refreshLeaveApprovalBadge();
})();

/* ── Leave Approvals modal (OWNER only) ── */
async function _refreshLeaveApprovalBadge() {
  if (window._authUser?.role !== 'OWNER') return;
  try {
    const r = await fetch('/api/leave-cancel-requests');
    const d = await r.json();
    const badge = document.getElementById('leaveApprovalBadge');
    const btn   = document.getElementById('leaveApprovalBtn');
    if (!badge || !btn) return;
    const count = Array.isArray(d) ? d.length : 0;
    if (count > 0) { badge.textContent = count; badge.style.display = 'inline-block'; btn.style.setProperty('display', 'flex', 'important'); }
    else { badge.style.display = 'none'; }
  } catch {}
}

function openLeaveApprovalsModal() {
  const mob = window.innerWidth <= 1024 || ('ontouchstart' in window);
  const pad = mob ? '13px 14px' : '9px 12px';
  const fs  = n => (mob ? n + 2 : n) + 'px';

  if (!document.getElementById('lcaOverlay')) {
    const ov = document.createElement('div');
    ov.id = 'lcaOverlay';
    ov.onclick = e => { if (e.target === ov) closeLeaveApprovalsModal(); };
    ov.innerHTML = `
      <div style="background:#131922;border:1px solid #222d3d;border-radius:16px;padding:26px 22px;width:100%;max-width:440px;max-height:88vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.65)">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
          <h3 style="font-family:'Fraunces',Georgia,serif;font-size:${fs(19)};color:#e6edf3;margin:0">Leave Approvals</h3>
          <button onclick="closeLeaveApprovalsModal()" style="background:none;border:none;color:#8b98a8;cursor:pointer;font-size:20px;line-height:1;padding:2px 6px">✕</button>
        </div>
        <div id="lcaList" style="min-height:40px;font-size:${fs(13)};color:#8b98a8">Loading…</div>
        <button onclick="closeLeaveApprovalsModal()" style="margin-top:20px;width:100%;padding:${pad};background:transparent;border:1px solid #222d3d;border-radius:8px;color:#8b98a8;cursor:pointer;font-family:inherit;font-size:${fs(14)}">Close</button>
      </div>`;
    document.body.appendChild(ov);
  }

  const mob2 = window.innerWidth <= 1024 || ('ontouchstart' in window);
  document.getElementById('lcaOverlay').style.cssText = mob2
    ? 'display:flex;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:9999;align-items:flex-end;justify-content:center;padding:0 0 env(safe-area-inset-bottom,0px)'
    : 'display:flex;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:9999;align-items:center;justify-content:center;padding:20px';
  _loadLeaveApprovals();
}

function closeLeaveApprovalsModal() {
  const o = document.getElementById('lcaOverlay');
  if (o) o.style.display = 'none';
}

async function _loadLeaveApprovals() {
  const list = document.getElementById('lcaList');
  if (!list) return;
  list.innerHTML = '<span style="color:#8b98a8">Loading…</span>';
  try {
    const r = await fetch('/api/leave-cancel-requests');
    const rows = await r.json();
    if (!rows.length) { list.innerHTML = '<span style="color:#8b98a8">No pending cancellation requests.</span>'; return; }
    const fmt = s => new Date(s + 'T12:00:00').toLocaleDateString('en-IN', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
    list.innerHTML = rows.map(row => `
      <div style="background:#1a2230;border:1px solid #222d3d;border-radius:10px;padding:14px 16px;margin-bottom:10px">
        <div style="font-size:14px;font-weight:700;color:#e6edf3;margin-bottom:4px">${row.emp_alias}</div>
        <div style="font-size:12px;color:#8b98a8;margin-bottom:10px">Wants to cancel leave on <span style="color:#d4af37">${fmt(row.leave_date)}</span></div>
        <div style="display:flex;gap:8px">
          <button onclick="lcaAction(${row.id},'approve',this)" style="flex:1;padding:9px;background:rgba(46,204,113,0.15);border:1px solid rgba(46,204,113,0.35);border-radius:8px;color:#2ecc71;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit">✓ Approve</button>
          <button onclick="lcaAction(${row.id},'reject',this)" style="flex:1;padding:9px;background:rgba(255,93,93,0.12);border:1px solid rgba(255,93,93,0.3);border-radius:8px;color:#ff5d5d;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit">✗ Reject</button>
        </div>
      </div>`).join('');
  } catch { list.innerHTML = '<span style="color:#ff5d5d">Failed to load. Try again.</span>'; }
}

async function lcaAction(id, action, btn) {
  btn.disabled = true; btn.textContent = '…';
  try {
    const r = await fetch(`/api/leave-cancel-requests/${id}/${action}`, { method: 'POST' });
    if (r.ok) {
      _loadLeaveApprovals();
      _refreshLeaveApprovalBadge();
    } else {
      btn.disabled = false; btn.textContent = action === 'approve' ? '✓ Approve' : '✗ Reject';
    }
  } catch { btn.disabled = false; btn.textContent = action === 'approve' ? '✓ Approve' : '✗ Reject'; }
}

/* ── Check Availability modal ── */
let _avStocks = null;

function openAvailabilityModal() {
  const mob = window.innerWidth <= 1024 || ('ontouchstart' in window);
  const pad = mob ? '13px 14px' : '9px 12px';
  const fs  = n => (mob ? n + 2 : n) + 'px';

  if (!document.getElementById('avOverlay')) {
    const todayIST = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Kolkata' }).format(new Date());
    const ov = document.createElement('div');
    ov.id = 'avOverlay';
    ov.onclick = e => { if (e.target === ov) closeAvailabilityModal(); };
    ov.innerHTML = `
      <div style="background:#131922;border:1px solid #222d3d;border-radius:16px;padding:26px 22px;width:100%;max-width:460px;max-height:88vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.65)">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
          <h3 style="font-family:'Fraunces',Georgia,serif;font-size:${fs(19)};color:#e6edf3;margin:0">Check Availability</h3>
          <button onclick="closeAvailabilityModal()" style="background:none;border:none;color:#8b98a8;cursor:pointer;font-size:20px;line-height:1;padding:2px 6px">✕</button>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
          <select id="avStock" onchange="checkAvailability()"
            style="flex:2;min-width:160px;padding:${pad};background:#1a2230;border:1px solid #222d3d;border-radius:8px;color:#e6edf3;font-size:${fs(13)};font-family:inherit;outline:none;cursor:pointer">
            <option value="">Select stock…</option>
          </select>
          <input id="avDate" type="date" onchange="checkAvailability()" value="${todayIST}"
            style="flex:1;min-width:130px;padding:${pad};background:#1a2230;border:1px solid #222d3d;border-radius:8px;color:#e6edf3;font-size:${fs(13)};font-family:inherit;outline:none;color-scheme:dark"/>
        </div>
        <div id="avResults" style="font-size:${fs(13)};color:#8b98a8;min-height:40px">Select a stock above to see availability.</div>
        <button onclick="closeAvailabilityModal()" style="margin-top:20px;width:100%;padding:${pad};background:transparent;border:1px solid #222d3d;border-radius:8px;color:#8b98a8;cursor:pointer;font-family:inherit;font-size:${fs(14)}">Close</button>
      </div>`;
    document.body.appendChild(ov);
    _loadAvStocks();
  }

  // Reset date to today and clear results
  const todayIST = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Kolkata' }).format(new Date());
  const dateInp  = document.getElementById('avDate');
  if (dateInp) { dateInp.value = todayIST; }
  document.getElementById('avResults').innerHTML = '<span style="color:#8b98a8">Select a stock above to see availability.</span>';
  const stockSel = document.getElementById('avStock');
  if (stockSel) stockSel.value = '';

  const mob2 = window.innerWidth <= 1024 || ('ontouchstart' in window);
  document.getElementById('avOverlay').style.cssText = mob2
    ? 'display:flex;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:9999;align-items:flex-end;justify-content:center;padding:0 0 env(safe-area-inset-bottom,0px)'
    : 'display:flex;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:9999;align-items:center;justify-content:center;padding:20px';
}

async function _loadAvStocks() {
  try {
    const r = await fetch('/api/stock-categories');
    _avStocks = await r.json();
    const sel = document.getElementById('avStock');
    if (!sel) return;
    _avStocks.forEach(s => {
      const o = document.createElement('option');
      o.value = s.id; o.textContent = s.label;
      sel.appendChild(o);
    });
  } catch {}
}

function closeAvailabilityModal() {
  const o = document.getElementById('avOverlay');
  if (o) o.style.display = 'none';
}

async function checkAvailability() {
  const stock = document.getElementById('avStock')?.value;
  const date  = document.getElementById('avDate')?.value;
  const out   = document.getElementById('avResults');
  if (!out) return;
  if (!stock) { out.innerHTML = '<span style="color:#8b98a8">Select a stock above to see availability.</span>'; return; }
  if (!date)  { out.innerHTML = '<span style="color:#8b98a8">Select a date.</span>'; return; }

  out.innerHTML = '<span style="color:#8b98a8">Checking…</span>';
  try {
    const r = await fetch(`/api/check-availability?stock=${encodeURIComponent(stock)}&date=${encodeURIComponent(date)}`);
    const d = await r.json();
    if (!r.ok) { out.innerHTML = `<span style="color:#ff5d5d">${d.error || 'Error'}</span>`; return; }

    const fmtLast = s => s
      ? new Date(s + 'T12:00:00').toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })
      : 'Never done';
    const row = (left, right, accent) =>
      `<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#1a2230;border-radius:8px;margin-bottom:5px;border-left:3px solid ${accent}">
        <span style="color:#e6edf3;font-weight:600;font-size:13px">${left}</span>
        <span style="color:#8b98a8;font-size:11px;text-align:right;max-width:55%">${right}</span>
      </div>`;

    let html = '';

    if (d.available.length) {
      html += `<div style="font-size:10px;font-weight:700;letter-spacing:.12em;color:#2ecc71;text-transform:uppercase;margin-bottom:7px">✓ Available (${d.available.length})</div>`;
      html += d.available.map((e, i) => row(`${i + 1}. ${e.alias}`, fmtLast(e.last_done), '#2ecc71')).join('');
    } else {
      html += `<div style="color:#8b98a8;font-size:13px;margin-bottom:12px">No one available for this stock on this date.</div>`;
    }

    if (d.busy.length) {
      html += `<div style="font-size:10px;font-weight:700;letter-spacing:.12em;color:#f39c12;text-transform:uppercase;margin:14px 0 7px">⏰ Busy (${d.busy.length})</div>`;
      html += d.busy.map(e => row(e.alias, e.busy_with.join(' · '), '#f39c12')).join('');
    }

    if (d.on_leave.length) {
      html += `<div style="font-size:10px;font-weight:700;letter-spacing:.12em;color:#ff5d5d;text-transform:uppercase;margin:14px 0 7px">✗ On Leave (${d.on_leave.length})</div>`;
      html += d.on_leave.map(e => row(e.alias,
        e.leave_type === 'FULL' ? 'Full Day' : e.leave_type === 'HALF_AM' ? 'Half Day (AM)' : 'Half Day (PM)',
        '#ff5d5d')).join('');
    }

    out.innerHTML = html || '<span style="color:#8b98a8">No data found for this stock.</span>';
  } catch { out.innerHTML = '<span style="color:#ff5d5d">Network error. Please try again.</span>'; }
}

/* ── Greetings modal ── */
function openGreetingsModal() {
  const mob = window.innerWidth <= 1024 || ('ontouchstart' in window);
  const pad = mob ? '14px 16px' : '10px 14px';
  const fs  = n => (mob ? n + 2 : n) + 'px';

  if (!document.getElementById('greetOverlay')) {
    const ov = document.createElement('div');
    ov.id = 'greetOverlay';
    ov.onclick = e => { if (e.target === ov) closeGreetingsModal(); };
    ov.innerHTML = `
      <div style="background:#131922;border:1px solid #222d3d;border-radius:16px;padding:26px 22px;width:100%;max-width:400px;max-height:88vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.65)">
        <div id="greetStep1">
          <h3 style="font-family:'Fraunces',Georgia,serif;font-size:${fs(20)};color:#e6edf3;margin:0 0 6px">Send Greeting</h3>
          <p style="font-size:${fs(12)};color:#8b98a8;margin-bottom:18px;line-height:1.6">Write a message to send as a push notification to selected employees.</p>
          <textarea id="greetMsg" rows="4" placeholder="e.g. Wishing you a wonderful day!"
            style="width:100%;padding:${pad};background:#1a2230;border:1px solid #222d3d;border-radius:8px;color:#e6edf3;font-size:${fs(14)};font-family:inherit;outline:none;resize:vertical;box-sizing:border-box;line-height:1.5"></textarea>
          <div id="greetErr1" style="display:none;margin-top:10px;padding:10px 12px;background:rgba(255,93,93,.12);border:1px solid rgba(255,93,93,.3);border-radius:8px;font-size:${fs(13)};color:#ff5d5d"></div>
          <div style="display:flex;gap:10px;margin-top:16px">
            <button onclick="closeGreetingsModal()" style="flex:1;padding:${pad};background:transparent;border:1px solid #222d3d;border-radius:8px;color:#8b98a8;cursor:pointer;font-family:inherit;font-size:${fs(14)}">Cancel</button>
            <button onclick="greetingsShowRecipients()" style="flex:2;padding:${pad};background:linear-gradient(135deg,#d4af37,#9c7c1a);border:none;border-radius:8px;color:#0d1117;font-size:${fs(14)};font-weight:700;cursor:pointer;font-family:inherit">Next →</button>
          </div>
        </div>
        <div id="greetStep2" style="display:none">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px">
            <button onclick="greetingsBack()" style="background:none;border:1px solid #222d3d;border-radius:8px;padding:6px 12px;color:#8b98a8;cursor:pointer;font-family:inherit;font-size:${fs(13)};flex-shrink:0">← Back</button>
            <h3 style="font-family:'Fraunces',Georgia,serif;font-size:${fs(18)};color:#e6edf3;margin:0">Select Recipients</h3>
          </div>
          <div id="greetEmpList" style="display:flex;flex-direction:column;gap:6px;max-height:300px;overflow-y:auto;margin-bottom:14px"></div>
          <div id="greetErr2" style="display:none;margin-bottom:12px;padding:10px 12px;background:rgba(255,93,93,.12);border:1px solid rgba(255,93,93,.3);border-radius:8px;font-size:${fs(13)};color:#ff5d5d"></div>
          <div style="display:flex;gap:10px">
            <button onclick="sendGreetings(false)" id="greetSendBtn" style="flex:1;padding:${pad};background:linear-gradient(135deg,#d4af37,#9c7c1a);border:none;border-radius:8px;color:#0d1117;font-size:${fs(14)};font-weight:700;cursor:pointer;font-family:inherit">Send</button>
            <button onclick="sendGreetings(true)" id="greetSendAllBtn" style="flex:1;padding:${pad};background:#1a2230;border:1px solid #d4af37;border-radius:8px;color:#d4af37;font-size:${fs(14)};font-weight:700;cursor:pointer;font-family:inherit">Send to All</button>
          </div>
        </div>
      </div>`;
    document.body.appendChild(ov);
  }

  document.getElementById('greetStep1').style.display = 'block';
  document.getElementById('greetStep2').style.display = 'none';
  document.getElementById('greetMsg').value = '';
  document.getElementById('greetErr1').style.display = 'none';

  const mob2 = window.innerWidth <= 1024 || ('ontouchstart' in window);
  document.getElementById('greetOverlay').style.cssText = mob2
    ? 'display:flex;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:9999;align-items:flex-end;justify-content:center;padding:0 0 env(safe-area-inset-bottom,0px)'
    : 'display:flex;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:9999;align-items:center;justify-content:center;padding:20px';
}

function closeGreetingsModal() {
  const o = document.getElementById('greetOverlay');
  if (o) o.style.display = 'none';
}

function greetingsBack() {
  document.getElementById('greetStep1').style.display = 'block';
  document.getElementById('greetStep2').style.display = 'none';
  document.getElementById('greetErr2').style.display = 'none';
}

async function greetingsShowRecipients() {
  const msg  = document.getElementById('greetMsg').value.trim();
  const err1 = document.getElementById('greetErr1');
  if (!msg) { err1.textContent = 'Please enter a message.'; err1.style.display = 'block'; return; }
  err1.style.display = 'none';

  document.getElementById('greetStep1').style.display = 'none';
  document.getElementById('greetStep2').style.display = 'block';

  const list = document.getElementById('greetEmpList');
  list.innerHTML = '<span style="color:#8b98a8;font-size:13px">Loading…</span>';
  try {
    const r    = await fetch('/api/push/subscribed-employees');
    const emps = await r.json();
    if (!emps.length) { list.innerHTML = '<span style="color:#8b98a8;font-size:13px">No employees have notifications enabled yet.</span>'; return; }
    list.innerHTML = emps.map(name => `
      <label style="display:flex;align-items:center;gap:12px;padding:10px 14px;background:#1a2230;border-radius:8px;cursor:pointer;border:1px solid #222d3d">
        <input type="checkbox" value="${name}" checked style="width:16px;height:16px;accent-color:#d4af37;cursor:pointer;flex-shrink:0">
        <span style="color:#e6edf3;font-size:14px;font-weight:500">${name}</span>
      </label>`).join('');
  } catch { list.innerHTML = '<span style="color:#ff5d5d;font-size:13px">Failed to load employees.</span>'; }
}

async function sendGreetings(sendAll) {
  const msg  = document.getElementById('greetMsg').value.trim();
  const err2 = document.getElementById('greetErr2');
  const checkboxes = document.querySelectorAll('#greetEmpList input[type=checkbox]');
  const employees  = Array.from(sendAll ? checkboxes : document.querySelectorAll('#greetEmpList input[type=checkbox]:checked')).map(cb => cb.value);

  if (!employees.length) { err2.textContent = 'Please select at least one employee.'; err2.style.display = 'block'; return; }
  err2.style.display = 'none';

  const btnId = sendAll ? 'greetSendAllBtn' : 'greetSendBtn';
  const btn   = document.getElementById(btnId);
  const orig  = btn.textContent;
  btn.disabled = true; btn.textContent = 'Sending…';

  try {
    const r = await fetch('/api/push/greet', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, employees }),
    });
    const d = await r.json();
    if (r.ok) {
      closeGreetingsModal();
      const toast = document.createElement('div');
      toast.textContent = `✓ Greeting sent to ${employees.length} employee${employees.length !== 1 ? 's' : ''}`;
      toast.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#2ecc71;color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:10000;box-shadow:0 4px 20px rgba(0,0,0,.3)';
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3500);
    } else {
      err2.textContent = d.error || 'Failed to send. Please try again.';
      err2.style.display = 'block';
    }
  } catch { err2.textContent = 'Network error. Please try again.'; err2.style.display = 'block'; }
  btn.disabled = false; btn.textContent = orig;
}
</script>
</body>
</html>
