<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
<meta name="theme-color" content="#0f2044"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="APPACHI"/>
<link rel="manifest" href="/manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet"/>
<title>Settings · APPACHI</title>
<style>
:root{
  --bg:#f2f0eb;--navy:#0f2044;--navy2:#1a3260;--navy-text:#1c2b42;
  --gold:#b8973a;--gold-light:#c9a84c;--gold-border:rgba(184,151,58,0.22);
  --surface:#fff;--surface2:#f7f5f1;--border:#ddd9d0;--muted:#7a8699;--red:#e53935;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:clamp(14px,1.6vw,16px)}
body{font-family:"Montserrat",sans-serif;font-weight:600;background:var(--bg);color:var(--navy-text);min-height:100dvh;width:100%;overflow-x:hidden}
.topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:env(safe-area-inset-top,0) 24px 0;min-height:calc(58px + env(safe-area-inset-top,0));background:var(--navy);border-bottom:2px solid var(--gold-border);box-shadow:0 2px 16px rgba(15,32,68,.22)}
.topbar-brand{font-family:"Cormorant Garamond",serif;font-size:20px;font-weight:700;letter-spacing:.14em;color:var(--gold-light);text-decoration:none}
.back-btn{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.55);text-decoration:none;transition:color .2s}
.back-btn:hover{color:var(--gold-light)}
#userLabel{font-size:11px;font-weight:700;letter-spacing:.06em;color:rgba(255,255,255,.5)}
.page{padding:24px 20px;max-width:560px;margin:0 auto;display:flex;flex-direction:column;gap:20px}
.section{background:var(--surface);border-radius:14px;overflow:hidden;border:1px solid var(--border);box-shadow:0 2px 8px rgba(15,32,68,.06)}
.sec-title{font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);padding:14px 18px 6px}
.row{display:flex;align-items:center;gap:14px;padding:16px 18px;border-top:1px solid var(--border);cursor:pointer;transition:background .15s;text-decoration:none;color:inherit}
.row:first-of-type{border-top:none}
.row:hover,.row:active{background:var(--surface2)}
.row-ico{font-size:22px;width:34px;text-align:center;flex-shrink:0}
.row-info{flex:1}
.row-title{font-size:15px;font-weight:700;color:var(--navy-text)}
.row-desc{font-size:12px;font-weight:500;color:var(--muted);margin-top:2px;line-height:1.5}
.row.danger .row-title{color:var(--red)}
.row-arrow{color:var(--muted);font-size:20px;flex-shrink:0}
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:#0f2044;color:#fff;padding:13px 26px;border-radius:12px;font-size:14px;font-weight:700;z-index:9999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}
@media(max-width:1024px),(hover:none) and (pointer:coarse){
  .topbar{padding-left:16px;padding-right:16px}
  .page{padding:18px 14px}
  .row{padding:18px 16px}
  .row-title{font-size:17px}
  .row-desc{font-size:13px}
  .row-ico{font-size:24px}
}
</style>
</head>
<body>

<header class="topbar">
  <a href="/" class="topbar-brand">&#11041; APPACHI</a>
  <div style="display:flex;align-items:center;gap:16px">
    <a href="/" class="back-btn">&#8592; Back</a>
    <span id="userLabel"></span>
  </div>
</header>

<div class="page">

  <!-- Security section -->
  <div class="section">
    <div class="sec-title">Security</div>

    <!-- Change PIN -->
    <div class="row" onclick="showChangePinModal()">
      <span class="row-ico">&#128273;</span>
      <div class="row-info">
        <div class="row-title">Change PIN</div>
        <div class="row-desc">Update your 4–6 digit login PIN</div>
      </div>
      <span class="row-arrow">&#8250;</span>
    </div>
  </div>

  <!-- Account section -->
  <div class="section">
    <div class="sec-title">Account</div>
    <div class="row danger" onclick="signOut()">
      <span class="row-ico">&#128682;</span>
      <div class="row-info">
        <div class="row-title">Sign Out</div>
        <div class="row-desc">Log out of this device</div>
      </div>
    </div>
  </div>

</div>

<script src="/auth.js"></script>
<script>
function signOut() {
  if (!confirm('Sign out of APPACHI?')) return;
  fetch('/api/logout', { method: 'POST' }).then(() => location.replace('/login.html'));
}

function toast(msg) {
  document.querySelectorAll('.toast').forEach(e => e.remove());
  const el = document.createElement('div');
  el.className = 'toast'; el.innerHTML = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}
</script>
</body>
</html>
