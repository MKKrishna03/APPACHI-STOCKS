<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
<meta name="theme-color" content="#0f2044"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="APPACHI"/>
<link rel="manifest" href="/manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet"/>
<title>Settings · APPACHI</title>
<style>
:root{
  --bg:#f2f0eb;--navy:#0f2044;--navy2:#1a3260;--navy-text:#1c2b42;
  --gold:#b8973a;--gold-light:#c9a84c;--gold-border:rgba(184,151,58,0.22);
  --surface:#fff;--surface2:#f7f5f1;--border:#ddd9d0;--muted:#7a8699;--red:#e53935;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:clamp(14px,1.6vw,16px)}
body{font-family:"Montserrat",sans-serif;font-weight:600;background:var(--bg);color:var(--navy-text);min-height:100dvh;width:100%;overflow-x:hidden}
.topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:env(safe-area-inset-top,0) 24px 0;min-height:calc(58px + env(safe-area-inset-top,0));background:var(--navy);border-bottom:2px solid var(--gold-border);box-shadow:0 2px 16px rgba(15,32,68,.22)}
.topbar-brand{font-family:"Cormorant Garamond",serif;font-size:20px;font-weight:700;letter-spacing:.14em;color:var(--gold-light);text-decoration:none}
.back-btn{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.55);text-decoration:none;transition:color .2s}
.back-btn:hover{color:var(--gold-light)}
#userLabel{font-size:11px;font-weight:700;letter-spacing:.06em;color:rgba(255,255,255,.5)}
.page{padding:24px 20px;max-width:560px;margin:0 auto;display:flex;flex-direction:column;gap:20px}
.section{background:var(--surface);border-radius:14px;overflow:hidden;border:1px solid var(--border);box-shadow:0 2px 8px rgba(15,32,68,.06)}
.sec-title{font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);padding:14px 18px 6px}
.row{display:flex;align-items:center;gap:14px;padding:16px 18px;border-top:1px solid var(--border);cursor:pointer;transition:background .15s;text-decoration:none;color:inherit}
.row:first-of-type{border-top:none}
.row:hover,.row:active{background:var(--surface2)}
.row-ico{font-size:22px;width:34px;text-align:center;flex-shrink:0}
.row-info{flex:1}
.row-title{font-size:15px;font-weight:700;color:var(--navy-text)}
.row-desc{font-size:12px;font-weight:500;color:var(--muted);margin-top:2px;line-height:1.5}
.row.danger .row-title{color:var(--red)}
.row-arrow{color:var(--muted);font-size:20px;flex-shrink:0}
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:#0f2044;color:#fff;padding:13px 26px;border-radius:12px;font-size:14px;font-weight:700;z-index:9999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}
.confirm-overlay{position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center}
.confirm-box{background:#fff;border-radius:16px;padding:28px 24px 20px;width:300px;max-width:88vw;box-shadow:0 8px 40px rgba(0,0,0,.28);text-align:center}
.confirm-box h3{font-size:16px;font-weight:800;color:#0f2044;margin-bottom:8px}
.confirm-box p{font-size:13px;font-weight:600;color:#7a8699;margin-bottom:22px;line-height:1.5}
.confirm-btns{display:flex;gap:10px;justify-content:center}
.confirm-btn{flex:1;padding:11px 0;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit}
.confirm-cancel{background:#eef2f7;color:#0f2044}
.confirm-ok{background:#e53935;color:#fff}
/* ── Change PIN modal ── */
.pin-modal-overlay{position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center}
.pin-modal{background:#fff;border-radius:18px;padding:28px 24px 22px;width:320px;max-width:92vw;box-shadow:0 8px 40px rgba(0,0,0,.3)}
.pin-modal h3{font-size:16px;font-weight:800;color:#0f2044;margin-bottom:18px;text-align:center}
.pin-field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.pin-field label{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#7a8699}
.pin-field input{padding:10px 13px;border:1.5px solid #ddd9d0;border-radius:9px;font-family:"Montserrat",sans-serif;font-size:14px;font-weight:700;color:#0f2044;outline:none;background:#f7f5f1;transition:border-color .2s;-webkit-text-security:disc}
.pin-field input:focus{border-color:#b8973a;background:#fff}
.pin-divider{display:flex;align-items:center;gap:10px;margin:4px 0 14px;color:#7a8699;font-size:11px;font-weight:700;letter-spacing:.08em}
.pin-divider::before,.pin-divider::after{content:'';flex:1;height:1px;background:#ddd9d0}
.pin-err{font-size:12px;font-weight:700;color:#e53935;min-height:18px;text-align:center;margin-bottom:6px}
.pin-modal-btns{display:flex;gap:10px;margin-top:4px}
.pin-modal-btn{flex:1;padding:12px 0;border:none;border-radius:10px;font-family:"Montserrat",sans-serif;font-size:13px;font-weight:800;cursor:pointer}
.pin-modal-cancel{background:#eef2f7;color:#0f2044}
.pin-modal-save{background:#0f2044;color:#c9a84c}
@media(max-width:1024px),(hover:none) and (pointer:coarse){
  .topbar{padding-left:16px;padding-right:16px}
  .page{padding:18px 14px}
  .row{padding:18px 16px}
  .row-title{font-size:17px}
  .row-desc{font-size:13px}
  .row-ico{font-size:24px}
}
</style>
</head>
<body>

<header class="topbar">
  <a href="/" class="topbar-brand">&#11041; APPACHI</a>
  <div style="display:flex;align-items:center;gap:16px">
    <a href="/" class="back-btn">&#8592; Back</a>
    <span id="userLabel"></span>
  </div>
</header>

<div class="page">

  <!-- Security section -->
  <div class="section">
    <div class="sec-title">Security</div>

    <!-- Change PIN -->
    <div class="row" onclick="showChangePinModal()">
      <span class="row-ico">&#128273;</span>
      <div class="row-info">
        <div class="row-title">Change PIN</div>
        <div class="row-desc">Update your 4–6 digit login PIN</div>
      </div>
      <span class="row-arrow">&#8250;</span>
    </div>
  </div>

  <!-- Account section -->
  <div class="section">
    <div class="sec-title">Account</div>
    <div class="row danger" onclick="signOut()">
      <span class="row-ico">&#128682;</span>
      <div class="row-info">
        <div class="row-title">Sign Out</div>
        <div class="row-desc">Log out of this device</div>
      </div>
    </div>
  </div>

</div>

<script src="/auth.js"></script>
<script>
function signOut() {
  const ov = document.createElement('div');
  ov.className = 'confirm-overlay';
  ov.innerHTML = `
    <div class="confirm-box">
      <h3>Sign Out</h3>
      <p>Sign out of APPACHI on this device?</p>
      <div class="confirm-btns">
        <button class="confirm-btn confirm-cancel" id="soCancel">Cancel</button>
        <button class="confirm-btn confirm-ok" id="soOk">Sign Out</button>
      </div>
    </div>`;
  document.body.appendChild(ov);
  ov.querySelector('#soCancel').onclick = () => ov.remove();
  ov.querySelector('#soOk').onclick = () => {
    ov.remove();
    fetch('/api/logout', { method: 'POST' }).then(() => location.replace('/login.html'));
  };
}

function showChangePinModal() {
  const ov = document.createElement('div');
  ov.className = 'pin-modal-overlay';
  ov.innerHTML = `
    <div class="pin-modal">
      <h3>&#128273; Change PIN</h3>
      <div class="pin-field">
        <label>Current PIN</label>
        <input type="tel" id="cp-current" inputmode="numeric" maxlength="6" placeholder="Enter current PIN"/>
      </div>
      <div class="pin-divider">OR</div>
      <div class="pin-field">
        <label>Admin Invite Code</label>
        <input type="text" id="cp-invite" inputmode="text" autocomplete="off" placeholder="Enter invite code from admin" style="-webkit-text-security:none"/>
      </div>
      <div class="pin-field" style="margin-top:6px">
        <label>New PIN (4–6 digits)</label>
        <input type="tel" id="cp-new" inputmode="numeric" maxlength="6" placeholder="Enter new PIN"/>
      </div>
      <div class="pin-field">
        <label>Confirm New PIN</label>
        <input type="tel" id="cp-confirm" inputmode="numeric" maxlength="6" placeholder="Re-enter new PIN"/>
      </div>
      <div class="pin-err" id="cp-err"></div>
      <div class="pin-modal-btns">
        <button class="pin-modal-btn pin-modal-cancel" id="cp-cancel">Cancel</button>
        <button class="pin-modal-btn pin-modal-save" id="cp-save">Save PIN</button>
      </div>
    </div>`;
  document.body.appendChild(ov);

  const err    = ov.querySelector('#cp-err');
  const setErr = (msg) => { err.textContent = msg; };

  ov.querySelector('#cp-cancel').onclick = () => ov.remove();

  ov.querySelector('#cp-save').onclick = async () => {
    const currentPin = ov.querySelector('#cp-current').value.trim();
    const inviteCode = ov.querySelector('#cp-invite').value.trim();
    const newPin     = ov.querySelector('#cp-new').value.trim();
    const confirmPin = ov.querySelector('#cp-confirm').value.trim();

    if (!currentPin && !inviteCode) return setErr('Enter your current PIN or an invite code');
    if (!newPin)     return setErr('Enter a new PIN');
    if (!/^\d{4,6}$/.test(newPin)) return setErr('PIN must be 4–6 digits');
    if (newPin !== confirmPin)      return setErr('PINs do not match');

    const saveBtn = ov.querySelector('#cp-save');
    saveBtn.disabled = true; saveBtn.textContent = 'Saving…';

    const body = { new_pin: newPin };
    if (inviteCode) body.invite_code = inviteCode;
    else            body.current_pin = currentPin;

    try {
      const r = await fetch('/api/me/pin', {
        method:  'PUT',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(body),
      }).then(r => r.json());

      if (r.error) { setErr(r.error); saveBtn.disabled = false; saveBtn.textContent = 'Save PIN'; return; }
      ov.remove();
      toast('&#10003; PIN updated successfully');
    } catch (e) { setErr('Network error — try again'); saveBtn.disabled = false; saveBtn.textContent = 'Save PIN'; }
  };
}

function toast(msg) {
  document.querySelectorAll('.toast').forEach(e => e.remove());
  const el = document.createElement('div');
  el.className = 'toast'; el.innerHTML = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}
</script>
</body>
</html>
