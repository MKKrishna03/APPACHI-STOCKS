<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>APPACHI</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0d1117;
    color: #d4af37;
    font-family: 'Georgia', serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 16px;
  }
  .logo {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, #d4af37, #9c7c1a);
    border-radius: 18px;
    display: grid;
    place-items: center;
    font-size: 36px;
    font-weight: 800;
    color: #0d1117;
  }
  p { font-size: 14px; color: #8b98a8; letter-spacing: .05em; }
</style>
</head>
<body>
  <div class="logo">S</div>
  <p>Connecting…</p>
  <script>
    // Request all permissions on first launch, then redirect to live server
    async function init() {
      if (window.Capacitor?.isNativePlatform()) {
        const asked = localStorage.getItem('perms_asked');
        if (!asked) {
          try {
            const { AppPermissions } = window.Capacitor.Plugins;
            if (AppPermissions) {
              await AppPermissions.requestAll();
              localStorage.setItem('perms_asked', '1');
            }
          } catch (_) {}
        }
      }
      // Capacitor server.url loads the remote app directly — this is a fallback
      window.location.href = 'https://appachi-stocks.onrender.com';
    }
    // Wait for Capacitor to be ready
    document.addEventListener('deviceready', init, false);
    setTimeout(init, 800); // fallback if deviceready doesn't fire
  </script>
</body>
</html>
