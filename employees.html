<style>
  :root {
    --bg:         #0d1117;
    --panel:      #131922;
    --panel-elev: #1a2230;
    --border:     #222d3d;
    --text:       #e6edf3;
    --text-dim:   #8b98a8;
    --accent:     #d4af37;
    --up:         #2ecc71;
    --down:       #ff5d5d;
    --sidebar-w:  240px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: clamp(14px, 1.6vw, 16px); }
  html, body { height: 100%; width: 100%; overflow-x: hidden; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }

  .app { display: grid; grid-template-columns: var(--sidebar-w) 1fr; min-height: 100vh; }

  /* â”€â”€ Sidebar â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
  .sidebar { background: var(--panel); border-right: 1px solid var(--border); padding: 24px 18px; display: flex; flex-direction: column; gap: 20px; }
  .brand { display: flex; align-items: center; gap: 10px; padding: 4px 6px 18px 6px; border-bottom: 1px solid var(--border); }
  .brand-mark { width: 28px; height: 28px; border-radius: 6px; background: linear-gradient(135deg, var(--accent), #9c7c1a); display: grid; place-items: center; font-family: 'Fraunces', serif; font-weight: 800; color: #0d1117; }
  .brand-name { font-family: 'Fraunces', serif; font-weight: 600; font-size: 18px; letter-spacing: 0.3px; }
  .nav-section { display: flex; flex-direction: column; gap: 4px; }
  .nav-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text-dim); padding: 6px 10px; }
  .nav-empty { padding: 18px 10px; border: 1px dashed var(--border); border-radius: 8px; color: var(--text-dim); font-size: 12px; text-align: center; font-style: italic; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; font-size: 14px; font-weight: 500; color: var(--text-dim); text-decoration: none; transition: background 0.15s, color 0.15s; cursor: pointer; }
  .nav-item:hover { background: var(--panel-elev); color: var(--text); }
  .nav-item.active { background: var(--panel-elev); color: var(--accent); }
  .nav-item svg { flex-shrink: 0; opacity: 0.7; }
  .nav-item:hover svg, .nav-item.active svg { opacity: 1; }
  .sidebar-footer { margin-top: auto; font-size: 11px; color: var(--text-dim); padding: 10px; border-top: 1px solid var(--border); }

  /* â”€â”€ Main â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
  .main { display: flex; flex-direction: column; }
  .topbar { height: 64px; border-bottom: 1px solid var(--border); padding: 0 28px; display: flex; align-items: center; justify-content: space-between; background: var(--panel); }
  .page-title { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 600; }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .search-box { background: var(--panel-elev); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px; width: 220px; outline: none; transition: border-color 0.15s; }
  .search-box::placeholder { color: var(--text-dim); }
  .search-box:focus { border-color: var(--accent); }
  .badge { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-dim); }

  /* â”€â”€ Content â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
  .content { flex: 1; padding: 28px 32px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 24px; }
  .tab { padding: 8px 20px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
  .tab:hover { border-color: var(--accent); color: var(--text); }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #0d1117; font-weight: 600; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }

  /* Employee card â€” clickable */
  .emp-card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    padding: 18px 16px; display: flex; align-items: center; gap: 14px;
    transition: border-color 0.15s, background 0.15s;
    cursor: pointer;
  }
  .emp-card:hover { border-color: var(--accent); background: var(--panel-elev); }

  .avatar { width: 42px; height: 42px; border-radius: 50%; display: grid; place-items: center; font-family: 'Fraunces', serif; font-weight: 700; font-size: 16px; flex-shrink: 0; }
  .avatar.male   { background: #1a2d4a; color: #5b9bd5; }
  .avatar.female { background: #2e1a2e; color: #c97ab2; }

  .emp-info { min-width: 0; }
  .emp-name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .emp-fullname { font-size: 11px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; display: none; }
  .emp-card:hover .emp-fullname { display: block; }
  .emp-meta { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
  .emp-desig { font-size: 11px; color: var(--text-dim); }
  .emp-stocks { display: flex; align-items: center; gap: 5px; margin-top: 4px; }
  .emp-stocks-a { font-size: 11px; color: var(--up); font-weight: 600; }
  .emp-stocks-sep { font-size: 11px; color: var(--border); }
  .emp-stocks-u { font-size: 11px; color: var(--text-dim); }

  .state-msg { text-align: center; color: var(--text-dim); padding: 60px 0; font-size: 14px; }

  @media (max-width: 1024px), (hover: none) and (pointer: coarse) {
    .app { grid-template-columns: 1fr; }
    .sidebar { display: none !important; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    .search-box { width: 150px; font-size: 16px; }
    .topbar { padding: 0 16px; }
    .content { padding: 16px; }
    .emp-name { font-size: 15px; }
    .emp-desig { font-size: 13px; }
  }

  /* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
     READ-ONLY STOCK VIEW MODAL
  â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.70);
    backdrop-filter: blur(3px);
    display: flex; align-items: center; justify-content: center;
    z-index: 999;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: min(540px, 94vw);
    max-height: 88vh;
    display: flex; flex-direction: column;
    box-shadow: 0 24px 64px rgba(0,0,0,0.55);
    transform: translateY(14px); transition: transform 0.2s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  /* Header */
  .modal-head {
    padding: 22px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px;
    flex-shrink: 0;
  }
  .modal-av {
    width: 52px; height: 52px; border-radius: 50%;
    display: grid; place-items: center;
    font-family: 'Fraunces', serif; font-weight: 700; font-size: 20px; flex-shrink: 0;
  }
  .modal-av.male   { background: #1a2d4a; color: #5b9bd5; }
  .modal-av.female { background: #2e1a2e; color: #c97ab2; }
  .modal-info { flex: 1; min-width: 0; }
  .modal-alias { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 600; color: var(--text); }
  .modal-full  { font-size: 12px; color: var(--text-dim); margin-top: 3px; }
  .modal-tags  { display: flex; gap: 6px; margin-top: 7px; flex-wrap: wrap; }
  .mtag { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; padding: 3px 9px; border-radius: 4px; }
  .mtag.desig  { background: rgba(212,175,55,0.12); color: var(--accent); }
  .mtag.gender { background: rgba(139,152,168,0.1);  color: var(--text-dim); }
  .modal-close { background: transparent; border: 1px solid transparent; border-radius: 7px; color: var(--text-dim); cursor: pointer; padding: 6px 10px; font-size: 16px; transition: all 0.1s; flex-shrink: 0; line-height: 1; }
  .modal-close:hover { border-color: var(--down); color: var(--down); background: rgba(255,93,93,0.07); }

  /* Body */
  .modal-body { flex: 1; overflow-y: auto; padding: 0; }

  /* Section */
  .msection { padding: 18px 24px; }
  .msection + .msection { border-top: 1px solid var(--border); }
  .msec-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .msec-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
  .msec-title.assigned   { color: var(--accent); }
  .msec-title.unassigned { color: var(--text-dim); }
  .msec-cnt { font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 2px 8px; border-radius: 10px; }
  .msec-cnt.assigned   { background: rgba(212,175,55,0.1); color: var(--accent); }
  .msec-cnt.unassigned { background: rgba(139,152,168,0.08); color: var(--text-dim); }

  /* Stock list grid */
  .slist { display: grid; grid-template-columns: repeat(auto-fill, minmax(195px, 1fr)); gap: 5px; }
  .sitem { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 7px; font-size: 12px; font-weight: 500; }
  .sitem.assigned   { background: rgba(212,175,55,0.07); color: var(--text); }
  .sitem.unassigned { background: rgba(139,152,168,0.05); color: var(--text-dim); opacity: 0.55; }
  .sdot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .sitem.assigned   .sdot { background: var(--accent); }
  .sitem.unassigned .sdot { background: var(--text-dim); }

  .modal-loading { padding: 40px; text-align: center; color: var(--text-dim); font-size: 13px; }

  /* Show/hide toggle for unassigned */
  .toggle-btn { background: none; border: none; cursor: pointer; font-size: 11px; color: var(--text-dim); text-decoration: underline; text-decoration-style: dotted; }
  .toggle-btn:hover { color: var(--text); }

  /* Hint on card */
  .emp-hint { font-size: 10px; color: var(--text-dim); margin-top: 3px; opacity: 0; transition: opacity 0.15s; }
  .emp-card:hover .emp-hint { opacity: 1; }

  .remove-btn { background: transparent; border: 1px solid transparent; border-radius: 7px; color: var(--text-dim); cursor: pointer; padding: 6px 10px; font-size: 12px; font-weight: 600; font-family: 'Inter', sans-serif; transition: all 0.1s; flex-shrink: 0; display: none; }
  .remove-btn:hover { border-color: var(--down); color: var(--down); background: rgba(255,93,93,0.07); }
</style>
</head>

];

/* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
   CONSTANTS
â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
const GENTS_IDS = new Set(['shop_opening', 'shop_closing']);
const FEMALE_ELIGIBLE = ALL_STOCKS.filter(s => !GENTS_IDS.has(s.id)); // 23 stocks
const MALE_ELIGIBLE   = ALL_STOCKS.filter(s =>  GENTS_IDS.has(s.id)); // 2 stocks

/* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
   STATE
â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
let allEmployees   = [];
let assignmentMap  = {};   // { alias: [stock_id, ...] }
let currentFilter  = 'ALL';
let showUnassigned = false;
let currentEmpId   = null;

/* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
   LOAD & RENDER GRID
â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
async function loadEmployees() {
  try {
    const [empRes, mapRes] = await Promise.all([
      fetch('/api/employees'),
      fetch('/api/assignments/all'),
    ]);
    allEmployees  = await empRes.json();
    assignmentMap = await mapRes.json();
    render();
  } catch {
    document.getElementById('empGrid').innerHTML =
      '<div class="state-msg">âŒ Failed to load employees</div>';
  }
}

function render() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = allEmployees.filter(e => {
    const matchFilter = currentFilter === 'ALL' || e.gender === currentFilter;
    const alias = (e.alias_name || e.name).toLowerCase();
    const matchSearch = alias.includes(q) || e.name.toLowerCase().includes(q) || String(e.id).includes(q);
    return matchFilter && matchSearch;
  });

  document.getElementById('countBadge').textContent = `${filtered.length} staff`;

  const grid = document.getElementById('empGrid');
  if (!filtered.length) { grid.innerHTML = '<div class="state-msg">No employees found</div>'; return; }

  grid.innerHTML = filtered.map(e => {
    const alias    = e.alias_name || e.name;
    const initials = alias.split(/[\s\-]+/).map(w => w[0]).slice(0, 2).join('');
    const gClass   = e.gender === 'MALE' ? 'male' : 'female';
    const showFull = e.alias_name && e.alias_name !== e.name;
    const desig    = e.designation || '';

    // Stock counts â€” male sees only 2 gents stocks; female sees 23 non-gents
    const isMale   = (e.gender || '').toUpperCase() === 'MALE';
    const eligible = isMale ? MALE_ELIGIBLE : FEMALE_ELIGIBLE;
    const empStocks = new Set(assignmentMap[alias] || []);
    const assigned  = eligible.filter(s =>  empStocks.has(s.id)).length;
    const unassigned= eligible.length - assigned;

    return `
      <div class="emp-card" onclick="openModal(${e.id})">
        <div class="avatar ${gClass}">${initials}</div>
        <div class="emp-info">
          <div class="emp-name">${alias}</div>
          ${showFull ? `<div class="emp-fullname">${e.name}</div>` : ''}
          <div class="emp-stocks">
            <span class="emp-stocks-a">${assigned} assigned</span>
            <span class="emp-stocks-sep">Â·</span>
            <span class="emp-stocks-u">${unassigned} pending</span>
          </div>
          ${desig ? `<div class="emp-desig" style="margin-top:2px">${desig}</div>` : ''}
          <div class="emp-hint">Click to view details</div>
        </div>
      </div>`;
  }).join('');
}

/* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
   MODAL â€” open
â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
async function openModal(empId) {
  const emp = allEmployees.find(e => String(e.id) === String(empId));
  if (!emp) return;
  currentEmpId = emp.id;

  const alias    = emp.alias_name || emp.name;
  const initials = alias.split(/[\s\-]+/).map(w => w[0]).slice(0, 2).join('');
  const gClass   = (emp.gender || '') === 'MALE' ? 'male' : 'female';
  const showFull = emp.alias_name && emp.alias_name !== emp.name;

  // Populate header
  const av = document.getElementById('mAv');
  av.textContent = initials;
  av.className   = `modal-av ${gClass}`;
  document.getElementById('mAlias').textContent = alias;
  document.getElementById('mFull').textContent  = showFull ? emp.name : '';

  const tags = document.getElementById('mTags');
  tags.innerHTML = '';
  if (emp.designation) tags.innerHTML += `<span class="mtag desig">${emp.designation}</span>`;
  if (emp.gender)      tags.innerHTML += `<span class="mtag gender">${emp.gender.charAt(0) + emp.gender.slice(1).toLowerCase()}</span>`;

  // Show Remove button only for OWNER (auth.js exposes window._authUser)
  const removeBtn = document.getElementById('mRemoveBtn');
  if (removeBtn) removeBtn.style.display = (window._authUser?.role === 'OWNER') ? 'block' : 'none';

  // Reset and show overlay
  showUnassigned = false;
  document.getElementById('mBody').innerHTML = '<div class="modal-loading">Loading stocksâ€¦</div>';
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';

  // Fetch and render
  try {
    const res      = await fetch(`/api/assignments/employee/${encodeURIComponent(alias)}`);
    const assigned = await res.json();
    renderModalBody(assigned, emp.gender);
  } catch {
    document.getElementById('mBody').innerHTML =
      '<div class="modal-loading">âŒ Failed to load stocks</div>';
  }
}

/* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
   MODAL â€” render body (READ-ONLY)
â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
function renderModalBody(assignedIds, gender) {
  const aSet   = new Set(assignedIds);
  const isMale = (gender || '').toUpperCase() === 'MALE';
  // Males see only their 2 gents stocks; females see the 23 non-gents stocks
  const relevant = isMale ? MALE_ELIGIBLE : FEMALE_ELIGIBLE;

  const assignedList   = relevant.filter(s =>  aSet.has(s.id));
  const unassignedList = relevant.filter(s => !aSet.has(s.id));

  const na = assignedList.length;
  const nu = unassignedList.length;

  const assignedHtml = na > 0
    ? `<div class="slist">${assignedList.map(s =>
        `<div class="sitem assigned"><span class="sdot"></span>${s.label}</div>`
      ).join('')}</div>`
    : `<p style="font-size:12px;color:var(--text-dim);font-style:italic;padding:4px 0">No stocks assigned</p>`;

  const unassignedHtml = `
    <div class="slist" id="unassignedList" style="display:${showUnassigned ? 'grid' : 'none'}">
      ${unassignedList.map(s =>
        `<div class="sitem unassigned"><span class="sdot"></span>${s.label}</div>`
      ).join('')}
    </div>`;

  document.getElementById('mBody').innerHTML = `
    <!-- ASSIGNED -->
    <div class="msection">
      <div class="msec-hd">
        <span class="msec-title assigned">âœ… Assigned Stocks</span>
        <span class="msec-cnt assigned">${na}</span>
      </div>
      ${assignedHtml}
    </div>

    <!-- NOT ASSIGNED -->
    <div class="msection">
      <div class="msec-hd">
        <span class="msec-title unassigned">â—‹ Not Assigned</span>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="msec-cnt unassigned">${nu}</span>
          <button class="toggle-btn" id="toggleBtn" onclick="toggleUnassigned()">
            ${showUnassigned ? 'Hide' : 'Show'}
          </button>
        </div>
      </div>
      ${unassignedHtml}
    </div>`;
}

function toggleUnassigned() {
  showUnassigned = !showUnassigned;
  const list = document.getElementById('unassignedList');
  const btn  = document.getElementById('toggleBtn');
  if (list) list.style.display = showUnassigned ? 'grid' : 'none';
  if (btn)  btn.textContent    = showUnassigned ? 'Hide' : 'Show';
}

/* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
   REMOVE EMPLOYEE
â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
async function removeEmployee() {
  if (!currentEmpId) return;
  const emp = allEmployees.find(e => String(e.id) === String(currentEmpId));
  if (!emp) return;
  const alias = emp.alias_name || emp.name;
  if (!confirm(`Remove "${alias}" permanently?\n\nThis will delete the employee and all their stock assignments.`)) return;

  const btn = document.getElementById('mRemoveBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Removingâ€¦'; }

  try {
    const r = await fetch(`/api/employees/${currentEmpId}`, { method: 'DELETE' });
    const d = await r.json();
    if (!r.ok) { alert(d.error || 'Failed to remove employee'); return; }
    closeModal();
    allEmployees = allEmployees.filter(e => String(e.id) !== String(currentEmpId));
    render();
  } catch { alert('Network error. Please try again.'); }
  finally { if (btn) { btn.disabled = false; btn.textContent = 'Remove'; } }
}

/* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
   MODAL â€” close
â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  currentEmpId = null;
}

// Click outside to close
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

// ESC to close
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

/* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
   TABS & SEARCH
â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});
document.getElementById('searchInput').addEventListener('input', render);

/* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
   INIT
â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
loadEmployees();
</script>
