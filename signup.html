<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#b8973a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="APPACHI"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icons/icon-192.png"/>
<title>Sign Up · APPACHI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117; --panel: #131922; --panel-elev: #1a2230;
    --border: #222d3d; --text: #e6edf3; --text-dim: #8b98a8; --accent: #d4af37;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; gap: 16px; }

  .card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 16px;
    padding: 36px 32px 32px; width: 100%; max-width: 420px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.4);
  }
  .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
  .brand-mark {
    width: 34px; height: 34px; border-radius: 8px; flex-shrink: 0;
    background: linear-gradient(135deg, var(--accent), #9c7c1a);
    display: grid; place-items: center;
    font-family: 'Fraunces', serif; font-weight: 800; font-size: 17px; color: #0d1117;
  }
  .brand-name { font-family: 'Fraunces', serif; font-weight: 600; font-size: 19px; }
  .brand-sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

  h1 { font-family: 'Fraunces', serif; font-weight: 600; font-size: 20px; margin-bottom: 4px; }
  .subtitle { font-size: 12px; color: var(--text-dim); margin-bottom: 24px; line-height: 1.5; }

  .invite-banner {
    background: rgba(212,175,55,0.08); border: 1px solid rgba(212,175,55,0.25);
    border-radius: 8px; padding: 10px 14px; font-size: 12px; color: var(--accent);
    margin-bottom: 20px; line-height: 1.5;
  }

  label { display: block; font-size: 11px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 7px; }
  .field { margin-bottom: 14px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  input {
    width: 100%; padding: 10px 13px; background: var(--panel-elev); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 15px;
    outline: none; transition: border-color 0.15s; -webkit-appearance: none;
  }
  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--text-dim); opacity: 0.45; }

  .btn {
    width: 100%; padding: 13px; background: linear-gradient(135deg, var(--accent), #9c7c1a);
    border: none; border-radius: 8px; color: #0d1117; font-family: 'Inter', sans-serif;
    font-size: 14px; font-weight: 700; cursor: pointer; letter-spacing: .3px;
    transition: opacity 0.15s; margin-top: 8px;
  }
  .btn:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .error {
    display: none; background: rgba(255,93,93,0.12); border: 1px solid rgba(255,93,93,0.3);
    border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #ff5d5d; margin-bottom: 14px;
  }
  .error.show { display: block; }

  .back-link { font-size: 12px; color: var(--text-dim); text-decoration: none; }
  .back-link:hover { color: var(--accent); }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-mark">S</div>
      <div>
        <div class="brand-name">Stocks</div>
        <div class="brand-sub">APPACHI JEWELLERY</div>
      </div>
    </div>

    <h1>Create Account</h1>
    <p class="subtitle">Sign up with your Employee ID and the invite code given by your admin.</p>

    <div class="invite-banner">
      &#128273; Ask admin for your personal invite code before signing up.
    </div>

    <div class="error" id="errMsg"></div>

    <form onsubmit="handleSignup(event)">
      <div class="row">
        <div class="field">
          <label>Employee ID</label>
          <input id="empId" type="text" inputmode="numeric" placeholder="e.g. 55" required/>
        </div>
        <div class="field">
          <label>Invite Code</label>
          <input id="inviteCode" type="text" placeholder="e.g. AB3XY7" maxlength="6" style="text-transform:uppercase" required/>
        </div>
      </div>
      <div class="field">
        <label>Email Address</label>
        <input id="email" type="email" placeholder="your@email.com" autocomplete="email" required/>
      </div>
      <div class="row">
        <div class="field">
          <label>Password</label>
          <input id="password" type="password" placeholder="Min 6 chars" autocomplete="new-password" required/>
        </div>
        <div class="field">
          <label>Confirm Password</label>
          <input id="confirmPassword" type="password" placeholder="Repeat" autocomplete="new-password" required/>
        </div>
      </div>
      <div class="field">
        <label>PIN (4–6 digits)</label>
        <input id="pin" type="password" inputmode="numeric" placeholder="Quick login PIN" required/>
      </div>
      <button class="btn" type="submit" id="submitBtn">Create Account</button>
    </form>
  </div>

  <a href="/login.html" class="back-link">← Back to Sign In</a>

<script>
// If already logged in, go to app
fetch('/api/me').then(r => { if (r.ok) window.location.replace('/entry.html'); }).catch(() => {});

async function handleSignup(e) {
  e.preventDefault();
  const err = document.getElementById('errMsg');
  const btn = document.getElementById('submitBtn');
  err.classList.remove('show');

  const empId   = document.getElementById('empId').value.trim();
  const code    = document.getElementById('inviteCode').value.trim().toUpperCase();
  const email   = document.getElementById('email').value.trim();
  const pass    = document.getElementById('password').value;
  const confirm = document.getElementById('confirmPassword').value;
  const pin     = document.getElementById('pin').value;

  if (pass !== confirm) {
    err.textContent = 'Passwords do not match.'; err.classList.add('show'); return;
  }
  if (!/^\d{4,6}$/.test(pin)) {
    err.textContent = 'PIN must be 4–6 digits only.'; err.classList.add('show'); return;
  }

  btn.disabled = true; btn.textContent = 'Creating account…';
  try {
    const r = await fetch('/api/signup', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ employee_id: empId, invite_code: code, email, password: pass, pin }),
    });
    const d = await r.json();
    if (!r.ok || !d.ok) {
      err.textContent = d.error || 'Signup failed. Please try again.';
      err.classList.add('show');
    } else {
      window.location.replace(d.isAdmin ? '/sql-editor.html' : '/entry.html');
    }
  } catch {
    err.textContent = 'Network error. Please try again.';
    err.classList.add('show');
  }
  btn.disabled = false; btn.textContent = 'Create Account';
}
</script>
</body>
</html>
