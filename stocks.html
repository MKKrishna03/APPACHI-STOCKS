<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#b8973a"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="APPACHI"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icons/icon-192.png"/>
<title>Stocks · APPACHI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #0d1117;
    --panel:      #131922;
    --panel-elev: #1a2230;
    --border:     #222d3d;
    --text:       #e6edf3;
    --text-dim:   #8b98a8;
    --accent:     #d4af37;
    --up:         #2ecc71;
    --down:       #ff5d5d;
    --sidebar-w:  240px;
    --cat-w:      216px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: clamp(14px, 1.6vw, 16px); }
  html, body { height: 100%; width: 100%; overflow-x: hidden; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }

  /* ── App shell ──────────────────────────────────────────────────────── */
  .app { display: grid; grid-template-columns: var(--sidebar-w) 1fr; height: 100vh; overflow: hidden; }

  /* ── Sidebar ────────────────────────────────────────────────────────── */
  .sidebar { background: var(--panel); border-right: 1px solid var(--border); padding: 24px 18px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
  .brand { display: flex; align-items: center; gap: 10px; padding: 4px 6px 18px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .brand-mark { width: 28px; height: 28px; border-radius: 6px; background: linear-gradient(135deg, var(--accent), #9c7c1a); display: grid; place-items: center; font-family: 'Fraunces', serif; font-weight: 800; color: #0d1117; flex-shrink: 0; }
  .brand-name { font-family: 'Fraunces', serif; font-weight: 600; font-size: 18px; letter-spacing: 0.3px; }
  .nav-section { display: flex; flex-direction: column; gap: 4px; }
  .nav-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text-dim); padding: 6px 10px; }
  .nav-empty { padding: 18px 10px; border: 1px dashed var(--border); border-radius: 8px; color: var(--text-dim); font-size: 12px; text-align: center; font-style: italic; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; font-size: 14px; font-weight: 500; color: var(--text-dim); text-decoration: none; transition: background 0.15s, color 0.15s; cursor: pointer; }
  .nav-item:hover { background: var(--panel-elev); color: var(--text); }
  .nav-item.active { background: var(--panel-elev); color: var(--accent); }
  .nav-item svg { flex-shrink: 0; opacity: 0.7; }
  .nav-item:hover svg, .nav-item.active svg { opacity: 1; }
  .sidebar-footer { margin-top: auto; font-size: 11px; color: var(--text-dim); padding: 10px; border-top: 1px solid var(--border); }

  /* ── Main ───────────────────────────────────────────────────────────── */
  .main { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  .topbar { height: 64px; flex-shrink: 0; border-bottom: 1px solid var(--border); padding: 0 28px; display: flex; align-items: center; justify-content: space-between; background: var(--panel); }
  .page-title { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 600; }
  .badge { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-dim); }

  /* ── Stocks body ────────────────────────────────────────────────────── */
  .stocks-body { display: flex; flex: 1; overflow: hidden; }

  /* Category nav */
  .cat-nav { width: var(--cat-w); flex-shrink: 0; background: var(--panel); border-right: 1px solid var(--border); overflow-y: auto; padding: 14px 10px; display: flex; flex-direction: column; gap: 2px; }
  .cat-group-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); padding: 10px 12px 4px; font-weight: 600; opacity: 0.65; }
  .cat-group-label:first-child { padding-top: 4px; }
  .cat-item { padding: 8px 12px; border-radius: 7px; font-size: 12px; font-weight: 500; color: var(--text-dim); cursor: pointer; transition: all 0.12s; user-select: none; border-left: 2px solid transparent; display: flex; align-items: center; justify-content: space-between; }
  .cat-item:hover { background: var(--panel-elev); color: var(--text); }
  .cat-item.active { background: rgba(212,175,55,0.1); color: var(--accent); font-weight: 600; border-left-color: var(--accent); padding-left: 10px; }
  .cat-item.inactive-stock { opacity: 0.4; }
  .cat-item.inactive-stock .cat-item-label { text-decoration: line-through; }
  /* Gents-only badge on nav item */
  .gents-badge { font-size: 9px; background: rgba(91,155,213,0.15); color: #5b9bd5; padding: 1px 5px; border-radius: 3px; margin-left: 4px; vertical-align: middle; font-weight: 600; }
  /* Active/inactive toggle */
  .toggle-active-btn { flex-shrink: 0; margin-left: 6px; width: 26px; height: 14px; border-radius: 7px; border: none; cursor: pointer; position: relative; transition: background 0.2s; outline: none; }
  .toggle-active-btn.on  { background: #2ecc71; }
  .toggle-active-btn.off { background: #555e6d; }
  .toggle-active-btn::after { content:''; position:absolute; top:2px; width:10px; height:10px; border-radius:50%; background:#fff; transition: left 0.2s; }
  .toggle-active-btn.on::after  { left: 14px; }
  .toggle-active-btn.off::after { left: 2px; }

  /* Assignment panel */
  .assign-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .panel-header { padding: 24px 32px 0; flex-shrink: 0; }
  .stock-title { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .stock-subtitle { font-size: 12px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; margin-bottom: 20px; }
  .stock-subtitle .n-assigned { color: var(--accent); font-weight: 700; }
  .stock-subtitle .n-unlinked { color: var(--text-dim); }
  .gents-notice { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; background: rgba(91,155,213,0.1); color: #5b9bd5; padding: 3px 10px; border-radius: 5px; margin-bottom: 16px; border: 1px solid rgba(91,155,213,0.2); }

  /* Scrollable content */
  .assign-body { flex: 1; overflow-y: auto; padding: 0 32px 40px; }

  /* Section headers */
  .section-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
  .section-label.assigned { color: var(--accent); }
  .section-label.unlinked  { color: var(--text-dim); }
  .section-line { flex: 1; height: 1px; background: var(--border); }
  .section-cnt { font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 2px 8px; border-radius: 10px; }
  .section-cnt.assigned { background: rgba(212,175,55,0.1); color: var(--accent); }
  .section-cnt.unlinked  { background: rgba(139,152,168,0.08); color: var(--text-dim); }

  .assign-section { margin-bottom: 28px; }

  /* Chips grid */
  .chips-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(186px, 1fr)); gap: 8px; }

  /* Employee chip */
  .emp-chip { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; border: 1px solid; transition: border-color 0.15s, background 0.15s; }
  .emp-chip.assigned { border-color: rgba(212,175,55,0.25); background: rgba(212,175,55,0.04); }
  .emp-chip.assigned:hover { border-color: rgba(212,175,55,0.5); background: rgba(212,175,55,0.08); }
  .emp-chip.unlinked  { border-color: var(--border); background: var(--panel); opacity: 0.75; }
  .emp-chip.unlinked:hover  { opacity: 1; border-color: var(--up); background: rgba(46,204,113,0.04); }

  .chip-avatar { width: 34px; height: 34px; border-radius: 50%; display: grid; place-items: center; font-family: 'Fraunces', serif; font-weight: 700; font-size: 13px; flex-shrink: 0; }
  .chip-avatar.female { background: #2e1a2e; color: #c97ab2; }
  .chip-avatar.male   { background: #1a2d4a; color: #5b9bd5; }

  .chip-name { font-size: 12px; font-weight: 600; color: var(--text); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Action buttons on chips */
  .chip-btn { width: 24px; height: 24px; border-radius: 50%; border: 1px solid transparent; display: grid; place-items: center; font-size: 13px; cursor: pointer; background: transparent; transition: all 0.12s; flex-shrink: 0; line-height: 1; }
  .chip-btn.remove { color: var(--text-dim); }
  .chip-btn.remove:hover { color: var(--down); border-color: var(--down); background: rgba(255,93,93,0.1); }
  .chip-btn.add { color: var(--text-dim); }
  .chip-btn.add:hover { color: var(--up); border-color: var(--up); background: rgba(46,204,113,0.1); }

  /* Empty state */
  .empty-chips { font-size: 12px; color: var(--text-dim); font-style: italic; padding: 8px 0; }

  /* Initial placeholder */
  .state-msg { text-align: center; color: var(--text-dim); padding: 60px 0; font-size: 13px; }
  .state-icon { font-size: 32px; margin-bottom: 14px; display: block; }

  /* Toast */
  #toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: var(--panel-elev); border: 1px solid var(--border); padding: 10px 22px; border-radius: 8px; font-size: 13px; color: var(--text); opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 100; white-space: nowrap; }
  #toast.show { opacity: 1; }

  @media (max-width: 1024px), (hover: none) and (pointer: coarse) {
    .app { grid-template-columns: 1fr; }
    .sidebar { display: none !important; }
    .cat-nav { width: 140px; font-size: 13px; }
    .assign-body { padding: 0 16px 32px; }
    .panel-header { padding: 16px 16px 0; }
    .topbar { padding: 0 16px; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- ═══════ MAIN SIDEBAR ═══════ -->
  <aside class="sidebar">
    <a href="/" class="brand" style="text-decoration:none">
      <div class="brand-mark">S</div>
      <div class="brand-name">Stocks</div>
    </a>
    <div class="nav-section">
      <div class="nav-label">Manage</div>
      <a href="/" class="nav-item">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Dashboard
      </a>
      <a href="/employees.html" class="nav-item">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        Employees
      </a>
      <a href="/stocks.html" class="nav-item active">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <line x1="3" y1="9" x2="21" y2="9"/>
          <line x1="3" y1="15" x2="21" y2="15"/>
          <line x1="9" y1="3" x2="9" y2="21"/>
        </svg>
        Stocks
      </a>
      <a href="/entry.html" class="nav-item">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
        Entry
      </a>
      <a href="/auto-assign.html" class="nav-item">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
          <path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/>
        </svg>
        Auto-Assign
      </a>
    </div>
    <a href="/sql-editor.html" class="nav-item owner-only" style="display:none">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
      </svg>
      SQL Editor
    </a>
    <div class="sidebar-footer" id="sidebarFooter">v0.1 · APPACHI</div>
  </aside>

  <!-- ═══════ MAIN ═══════ -->
  <main class="main">
    <header class="topbar">
      <div class="page-title">Stocks</div>
      <div style="display:flex;align-items:center;gap:10px">
        <button id="addStockBtn" onclick="openAddStockModal()"
          style="display:none;align-items:center;gap:6px;padding:7px 14px;background:linear-gradient(135deg,#d4af37,#9c7c1a);border:none;border-radius:8px;color:#0d1117;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;letter-spacing:.3px">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          ADD STOCK
        </button>
        <span class="badge" id="topBadge">—</span>
      </div>
    </header>

    <div class="stocks-body">

      <!-- Category Nav -->
      <nav class="cat-nav" id="catNav"></nav>

      <!-- Assignment Panel -->
      <div class="assign-panel">
        <div class="panel-header" id="panelHeader" style="display:none">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px">
            <div>
              <div class="stock-title" id="stockTitle"></div>
              <div class="stock-subtitle" id="stockSubtitle"></div>
            </div>
            <div style="display:flex;gap:8px;flex-shrink:0">
              <button id="editStockBtn" onclick="openEditModal()"
                style="display:none;align-items:center;gap:5px;padding:6px 12px;background:rgba(212,175,55,0.08);border:1px solid rgba(212,175,55,0.3);border-radius:8px;color:#d4af37;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s"
                onmouseover="this.style.background='rgba(212,175,55,0.18)'" onmouseout="this.style.background='rgba(212,175,55,0.08)'">
                <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                Edit
              </button>
              <button id="deleteStockBtn" onclick="deleteStock()"
                style="display:none;align-items:center;gap:5px;padding:6px 12px;background:rgba(255,93,93,0.1);border:1px solid rgba(255,93,93,0.35);border-radius:8px;color:#ff5d5d;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s"
                onmouseover="this.style.background='rgba(255,93,93,0.2)'" onmouseout="this.style.background='rgba(255,93,93,0.1)'">
                <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
                Delete
              </button>
            </div>
          </div>
          <div id="gentsNotice" style="display:none" class="gents-notice">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M16 8h4m-2-2v4"/><path d="M3 21v-1a7 7 0 0 1 10.46-6.07"/></svg>
            Male staff only
          </div>
        </div>

        <div class="assign-body" id="assignBody">
          <div class="state-msg">
            <span class="state-icon">☰</span>
            Select a stock from the left to manage assignments
          </div>
        </div>
      </div>

    </div>
  </main>
</div>

<div id="toast"></div>

<!-- ═══ ADD STOCK MODAL (2-step) ═══ -->
<div id="addStockOverlay" onclick="if(event.target===this)closeAddStockModal()"
  style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:900;align-items:center;justify-content:center;padding:16px">
  <div style="background:#131922;border:1px solid #222d3d;border-radius:16px;padding:28px 24px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.5)">

    <!-- Step indicator -->
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:20px">
      <div id="asStep1Dot" style="width:8px;height:8px;border-radius:50%;background:#d4af37"></div>
      <div style="flex:1;height:1px;background:#222d3d"></div>
      <div id="asStep2Dot" style="width:8px;height:8px;border-radius:50%;background:#222d3d"></div>
      <span id="asStepLabel" style="font-size:11px;color:#8b98a8;margin-left:4px">Step 1 of 2</span>
    </div>

    <div id="addStockErr" style="display:none;background:rgba(255,93,93,.12);border:1px solid rgba(255,93,93,.3);border-radius:8px;padding:10px 14px;font-size:13px;color:#ff5d5d;margin-bottom:14px"></div>

    <!-- ── STEP 1: Details ── -->
    <div id="asStep1">
      <h2 style="font-family:'Fraunces',serif;font-size:20px;color:#e6edf3;margin:0 0 18px">Stock Details</h2>

      <div style="margin-bottom:14px">
        <label style="display:block;font-size:11px;font-weight:600;color:#8b98a8;text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px">Stock Name</label>
        <input id="asName" type="text" placeholder="e.g. WINDOW CLEANING" autocomplete="off"
          style="width:100%;padding:10px 13px;background:#1a2230;border:1px solid #222d3d;border-radius:8px;color:#e6edf3;font-family:'Inter',sans-serif;font-size:14px;outline:none;box-sizing:border-box"
          oninput="this.value=this.value.toUpperCase()"
          onfocus="this.style.borderColor='#d4af37'" onblur="this.style.borderColor='#222d3d'"/>
      </div>

      <div style="margin-bottom:14px">
        <label style="display:block;font-size:11px;font-weight:600;color:#8b98a8;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px">Timing for Auto-Assign</label>
        <select id="asTiming"
          style="width:100%;padding:10px 13px;background:#1a2230;border:1px solid #222d3d;border-radius:8px;color:#e6edf3;font-family:'Inter',sans-serif;font-size:14px;outline:none;box-sizing:border-box;cursor:pointer"
          onfocus="this.style.borderColor='#d4af37'" onblur="this.style.borderColor='#222d3d'">
          <option value="any">Any Time (no conflict check)</option>
          <option value="0845">8:45 AM  — Morning opening</option>
          <option value="1000">10:00 AM — Mid-morning</option>
          <option value="1100">11:00 AM — Late morning</option>
          <option value="1500">3:00 PM  — Afternoon</option>
          <option value="1600">4:00 PM  — Late afternoon</option>
          <option value="1700">5:00 PM  — Evening</option>
          <option value="1930">7:30 PM  — Night</option>
          <option value="2130">9:30 PM  — Closing</option>
        </select>
      </div>

      <div style="margin-bottom:14px">
        <label style="display:block;font-size:11px;font-weight:600;color:#8b98a8;text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px">Employees / Day</label>
        <input id="asSlots" type="number" min="1" max="20" value="1"
          style="width:100%;padding:10px 13px;background:#1a2230;border:1px solid #222d3d;border-radius:8px;color:#e6edf3;font-family:'JetBrains Mono',monospace;font-size:15px;outline:none;box-sizing:border-box"
          onfocus="this.style.borderColor='#d4af37'" onblur="this.style.borderColor='#222d3d'"/>
      </div>

      <div style="margin-bottom:14px">
        <label style="display:block;font-size:11px;font-weight:600;color:#8b98a8;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px">Gender</label>
        <div style="display:flex;gap:12px">
          <label style="flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:9px;background:#1a2230;border:1px solid #222d3d;border-radius:8px;cursor:pointer;font-size:13px;color:#8b98a8;transition:all .15s" id="asGenderFemaleLabel">
            <input type="radio" name="asGender" value="female" checked onchange="asGenderChange()"
              style="accent-color:#d4af37;cursor:pointer"/> Female
          </label>
          <label style="flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:9px;background:#1a2230;border:1px solid #222d3d;border-radius:8px;cursor:pointer;font-size:13px;color:#8b98a8;transition:all .15s" id="asGenderGentsLabel">
            <input type="radio" name="asGender" value="gents" onchange="asGenderChange()"
              style="accent-color:#d4af37;cursor:pointer"/> Gents
          </label>
        </div>
      </div>

      <div style="margin-bottom:22px">
        <label style="display:block;font-size:11px;font-weight:600;color:#8b98a8;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px">Day Schedule</label>
        <div style="display:flex;gap:16px;margin-bottom:10px">
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;color:#8b98a8">
            <input type="radio" name="asDayMode" value="daily" checked onchange="toggleDayPicker(this.value)"
              style="accent-color:#d4af37;cursor:pointer"/> Daily
          </label>
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;color:#8b98a8">
            <input type="radio" name="asDayMode" value="specific" onchange="toggleDayPicker(this.value)"
              style="accent-color:#d4af37;cursor:pointer"/> Specific Days
          </label>
        </div>
        <div id="asDayPicker" style="display:none;flex-wrap:wrap;gap:6px">
          <label style="display:flex;align-items:center;gap:4px;padding:5px 10px;background:#1a2230;border:1px solid #222d3d;border-radius:6px;cursor:pointer;font-size:12px;color:#8b98a8"><input type="checkbox" value="0" style="accent-color:#d4af37"/> Sun</label>
          <label style="display:flex;align-items:center;gap:4px;padding:5px 10px;background:#1a2230;border:1px solid #222d3d;border-radius:6px;cursor:pointer;font-size:12px;color:#8b98a8"><input type="checkbox" value="1" style="accent-color:#d4af37"/> Mon</label>
          <label style="display:flex;align-items:center;gap:4px;padding:5px 10px;background:#1a2230;border:1px solid #222d3d;border-radius:6px;cursor:pointer;font-size:12px;color:#8b98a8"><input type="checkbox" value="2" style="accent-color:#d4af37"/> Tue</label>
          <label style="display:flex;align-items:center;gap:4px;padding:5px 10px;background:#1a2230;border:1px solid #222d3d;border-radius:6px;cursor:pointer;font-size:12px;color:#8b98a8"><input type="checkbox" value="3" style="accent-color:#d4af37"/> Wed</label>
          <label style="display:flex;align-items:center;gap:4px;padding:5px 10px;background:#1a2230;border:1px solid #222d3d;border-radius:6px;cursor:pointer;font-size:12px;color:#8b98a8"><input type="checkbox" value="4" style="accent-color:#d4af37"/> Thu</label>
          <label style="display:flex;align-items:center;gap:4px;padding:5px 10px;background:#1a2230;border:1px solid #222d3d;border-radius:6px;cursor:pointer;font-size:12px;color:#8b98a8"><input type="checkbox" value="5" style="accent-color:#d4af37"/> Fri</label>
          <label style="display:flex;align-items:center;gap:4px;padding:5px 10px;background:#1a2230;border:1px solid #222d3d;border-radius:6px;cursor:pointer;font-size:12px;color:#8b98a8"><input type="checkbox" value="6" style="accent-color:#d4af37"/> Sat</label>
        </div>
      </div>

      <div style="display:flex;gap:10px">
        <button onclick="closeAddStockModal()"
          style="flex:1;padding:11px;background:transparent;border:1px solid #222d3d;border-radius:8px;color:#8b98a8;cursor:pointer;font-family:inherit;font-size:14px">
          Cancel
        </button>
        <button onclick="asGoStep2()"
          style="flex:2;padding:11px;background:linear-gradient(135deg,#d4af37,#9c7c1a);border:none;border-radius:8px;color:#0d1117;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit">
          Next →
        </button>
      </div>
    </div>

    <!-- ── STEP 2: Employee selection ── -->
    <div id="asStep2" style="display:none">
      <h2 style="font-family:'Fraunces',serif;font-size:20px;color:#e6edf3;margin:0 0 4px">Select Employees</h2>
      <p id="asStep2Sub" style="font-size:12px;color:#8b98a8;margin:0 0 14px;line-height:1.6"></p>

      <div style="display:flex;justify-content:flex-end;gap:8px;margin-bottom:10px">
        <button onclick="asSelectAll(true)"
          style="padding:5px 12px;background:transparent;border:1px solid #222d3d;border-radius:6px;color:#8b98a8;cursor:pointer;font-size:12px;font-family:inherit">
          Select All
        </button>
        <button onclick="asSelectAll(false)"
          style="padding:5px 12px;background:transparent;border:1px solid #222d3d;border-radius:6px;color:#8b98a8;cursor:pointer;font-size:12px;font-family:inherit">
          Deselect All
        </button>
      </div>

      <div id="asEmpList"
        style="max-height:280px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;margin-bottom:18px;padding-right:4px">
      </div>

      <div style="display:flex;gap:10px">
        <button onclick="asGoStep1()"
          style="flex:1;padding:11px;background:transparent;border:1px solid #222d3d;border-radius:8px;color:#8b98a8;cursor:pointer;font-family:inherit;font-size:14px">
          ← Back
        </button>
        <button id="asSubmitBtn" onclick="submitAddStock()"
          style="flex:2;padding:11px;background:linear-gradient(135deg,#d4af37,#9c7c1a);border:none;border-radius:8px;color:#0d1117;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit">
          Create Stock
        </button>
      </div>
    </div>

  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════════
   CATEGORIES
═══════════════════════════════════════════════════════════════════════ */
// Static group mapping for known stocks
const STOCK_GROUPS = {
  cash:'Financial', steps:'Financial', chittai:'Financial', collection:'Financial',
  chain_stock:'Jewellery Stock', drops_stock:'Jewellery Stock', ring_stock:'Jewellery Stock',
  metty_mookuthi:'Jewellery Stock', pathiram_stock:'Jewellery Stock', sl_stock:'Jewellery Stock',
  kolusu_stock:'Jewellery Stock', purse_bag_stock:'Jewellery Stock', pathiram_sl_box:'Jewellery Stock',
  chain_arrange:'Arrangements', drops_arrange:'Arrangements', tray_arrange:'Arrangements', silver_arrange:'Arrangements',
  morning_cleaning:'Daily Tasks', tea:'Daily Tasks', dustbin_cleaning:'Daily Tasks',
  evening_cleaning:'Daily Tasks', dustbin_checking:'Daily Tasks', fan_cleaning:'Daily Tasks', maadi_cleaning:'Daily Tasks',
  shop_opening:'Shop (Gents)', shop_closing:'Shop (Gents)',
};
let CATEGORIES = [];

/* ═══════════════════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════════════════ */
let currentCat = null;
let allEmployees = [];
let isOwner = false;

/* ═══════════════════════════════════════════════════════════════════════
   CATEGORY NAV
═══════════════════════════════════════════════════════════════════════ */
function renderCatNav() {
  let html = '';
  CATEGORIES.forEach(c => {
    if (c.group !== null) html += `<div class="cat-group-label">${c.group}</div>`;
    const gentsBadge = c.gents ? `<span class="gents-badge">GENTS</span>` : '';
    const inactiveCls = c.is_active === false ? ' inactive-stock' : '';
    const toggleBtn = isOwner
      ? `<button class="toggle-active-btn ${c.is_active === false ? 'off' : 'on'}"
           title="${c.is_active === false ? 'Activate' : 'Deactivate'}"
           onclick="event.stopPropagation();toggleStockActive('${c.id}')"></button>`
      : '';
    html += `<div class="cat-item${currentCat === c.id ? ' active' : ''}${inactiveCls}"
               onclick="selectCat('${c.id}')">
               <span class="cat-item-label">${c.label}${gentsBadge}</span>${toggleBtn}
             </div>`;
  });
  document.getElementById('catNav').innerHTML = html;
}

async function toggleStockActive(id) {
  try {
    const r = await fetch(`/api/stock/${id}/toggle-active`, { method: 'POST' });
    const d = await r.json();
    if (!r.ok) { alert(d.error || 'Failed to toggle'); return; }
    const cat = CATEGORIES.find(c => c.id === id);
    if (cat) cat.is_active = d.is_active;
    renderCatNav();
  } catch (e) { alert('Network error'); }
}

async function selectCat(id) {
  currentCat = id;
  renderCatNav();
  const cat = CATEGORIES.find(c => c.id === id);
  document.getElementById('panelHeader').style.display = 'block';
  document.getElementById('stockTitle').textContent = cat.label;
  document.getElementById('gentsNotice').style.display = cat.gents ? 'inline-flex' : 'none';
  document.getElementById('stockSubtitle').textContent = 'Loading…';
  document.getElementById('assignBody').innerHTML =
    '<div class="state-msg"><span class="state-icon">⏳</span>Loading…</div>';
  const delBtn  = document.getElementById('deleteStockBtn');
  const editBtn = document.getElementById('editStockBtn');
  delBtn.style.display  = (isOwner && cat.is_custom) ? 'flex' : 'none';
  editBtn.style.display = isOwner ? 'flex' : 'none';
  await loadAssignments();
}

async function deleteStock() {
  const cat = CATEGORIES.find(c => c.id === currentCat);
  if (!cat) return;
  if (!confirm(`Delete "${cat.label}"?\n\nThis will permanently remove the stock, all its assignments, and all historical entries. This cannot be undone.`)) return;
  try {
    const res = await fetch(`/api/custom-stock/${currentCat}`, { method: 'DELETE' });
    const d   = await res.json();
    if (!res.ok) { alert(d.error || 'Failed to delete stock'); return; }
    toast(`🗑️ ${cat.label} deleted`);
    setTimeout(() => location.reload(), 800);
  } catch (e) {
    alert('Network error. Please try again.');
  }
}

/* ═══════════════════════════════════════════════════════════════════════
   LOAD & RENDER ASSIGNMENTS
═══════════════════════════════════════════════════════════════════════ */
async function loadAssignments() {
  try {
    const cat = CATEGORIES.find(c => c.id === currentCat);

    // Fetch assigned aliases for this stock
    const res     = await fetch(`/api/assignments/stock/${currentCat}`);
    const assigned = new Set(await res.json());

    // Filter employees: GENTS stocks → males only; others → all staff (excluding OTHERS type)
    const eligible = allEmployees.filter(e => {
      if (cat.gents) return (e.gender || '').toUpperCase() === 'MALE';
      return (e.gender || '').toUpperCase() === 'FEMALE'; // all other stocks → female staff only
    });

    const assignedEmps  = eligible.filter(e =>  assigned.has(e.alias_name || e.name));
    const unlinkedEmps  = eligible.filter(e => !assigned.has(e.alias_name || e.name));

    const na = assignedEmps.length;
    const nu = unlinkedEmps.length;

    document.getElementById('topBadge').textContent = `${na} assigned · ${nu} not linked`;
    document.getElementById('stockSubtitle').innerHTML =
      `<span class="n-assigned">${na} assigned</span>&nbsp;&nbsp;·&nbsp;&nbsp;<span class="n-unlinked">${nu} not linked</span>`;

    renderAssignments(assignedEmps, unlinkedEmps);
  } catch (e) {
    document.getElementById('assignBody').innerHTML =
      '<div class="state-msg">❌ Failed to load</div>';
  }
}

function renderAssignments(assignedEmps, unlinkedEmps) {
  const assignedHtml = assignedEmps.length > 0
    ? `<div class="chips-grid">${assignedEmps.map(e => chipHtml(e, 'assigned')).join('')}</div>`
    : `<div class="empty-chips">No employees assigned to this stock yet.</div>`;

  const unlinkedHtml = unlinkedEmps.length > 0
    ? `<div class="chips-grid">${unlinkedEmps.map(e => chipHtml(e, 'unlinked')).join('')}</div>`
    : `<div class="empty-chips">All eligible employees are already assigned. ✅</div>`;

  document.getElementById('assignBody').innerHTML = `
    <!-- ASSIGNED -->
    <div class="assign-section">
      <div class="section-row">
        <span class="section-label assigned">✅ Assigned</span>
        <span class="section-cnt assigned">${assignedEmps.length}</span>
        <span class="section-line"></span>
      </div>
      ${assignedHtml}
    </div>

    <!-- NOT LINKED -->
    <div class="assign-section">
      <div class="section-row">
        <span class="section-label unlinked">○ Not Linked</span>
        <span class="section-cnt unlinked">${unlinkedEmps.length}</span>
        <span class="section-line"></span>
      </div>
      ${unlinkedHtml}
    </div>`;
}

function chipHtml(emp, type) {
  const alias    = esc(emp.alias_name || emp.name);
  const rawAlias = emp.alias_name || emp.name;
  const initials = rawAlias.split(/[\s\-]+/).map(w => w[0]).slice(0, 2).join('');
  const g        = (emp.gender || '').toLowerCase() === 'male' ? 'male' : 'female';
  const safeAlias = rawAlias.replace(/'/g, "\\'");

  const btn = type === 'assigned'
    ? `<button class="chip-btn remove" onclick="removeAssignment('${safeAlias}')" title="Remove from this stock">✕</button>`
    : `<button class="chip-btn add"    onclick="addAssignment('${safeAlias}')"    title="Add to this stock">＋</button>`;

  return `
    <div class="emp-chip ${type}">
      <div class="chip-avatar ${g}">${initials}</div>
      <div class="chip-name">${alias}</div>
      ${btn}
    </div>`;
}

/* ═══════════════════════════════════════════════════════════════════════
   ADD / REMOVE
═══════════════════════════════════════════════════════════════════════ */
async function addAssignment(alias) {
  try {
    const res = await fetch('/api/assignments', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ stock_id: currentCat, emp_alias: alias }),
    });
    if (!res.ok) throw new Error();
    toast(`✅ ${alias} added`);
    await loadAssignments();
  } catch (e) {
    toast('❌ Failed to add');
  }
}

async function removeAssignment(alias) {
  try {
    const res = await fetch(
      `/api/assignments/${currentCat}/${encodeURIComponent(alias)}`,
      { method: 'DELETE' }
    );
    if (!res.ok) throw new Error();
    toast(`🗑️ ${alias} removed`);
    await loadAssignments();
  } catch (e) {
    toast('❌ Failed to remove');
  }
}

/* ═══════════════════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════════════════ */
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let _toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
}

/* ═══════════════════════════════════════════════════════════════════════
   ADD STOCK MODAL
═══════════════════════════════════════════════════════════════════════ */
/* ═══════════════════════════════════════════════════════════════════════
   ADD STOCK MODAL — 2-step
═══════════════════════════════════════════════════════════════════════ */
function toggleDayPicker(mode) {
  document.getElementById('asDayPicker').style.display = mode === 'specific' ? 'flex' : 'none';
}

function asGenderChange() {
  const isGents = document.querySelector('input[name=asGender]:checked')?.value === 'gents';
  document.getElementById('asGenderFemaleLabel').style.borderColor = isGents ? '#222d3d' : '#d4af37';
  document.getElementById('asGenderGentsLabel').style.borderColor  = isGents ? '#d4af37' : '#222d3d';
}

function openAddStockModal() {
  document.getElementById('asName').value   = '';
  document.getElementById('asSlots').value  = '1';
  document.getElementById('asTiming').value = 'any';
  document.querySelector('input[name=asGender][value=female]').checked = true;
  document.querySelector('input[name=asDayMode][value=daily]').checked = true;
  document.querySelectorAll('#asDayPicker input[type=checkbox]').forEach(cb => cb.checked = false);
  document.getElementById('asDayPicker').style.display = 'none';
  document.getElementById('addStockErr').style.display = 'none';
  document.getElementById('asSubmitBtn').disabled = false;
  document.getElementById('asSubmitBtn').textContent = 'Create Stock';
  asGenderChange();
  asGoStep1();
  document.getElementById('addStockOverlay').style.display = 'flex';
  setTimeout(() => document.getElementById('asName').focus(), 80);
}

function closeAddStockModal() {
  document.getElementById('addStockOverlay').style.display = 'none';
}

function asGoStep1() {
  document.getElementById('asStep1').style.display = 'block';
  document.getElementById('asStep2').style.display = 'none';
  document.getElementById('asStep1Dot').style.background = '#d4af37';
  document.getElementById('asStep2Dot').style.background = '#222d3d';
  document.getElementById('asStepLabel').textContent = 'Step 1 of 2';
  document.getElementById('addStockErr').style.display = 'none';
}

function asGoStep2() {
  const name    = document.getElementById('asName').value.trim();
  const dayMode = document.querySelector('input[name=asDayMode]:checked')?.value || 'daily';
  const days    = dayMode === 'specific'
    ? [...document.querySelectorAll('#asDayPicker input[type=checkbox]:checked')].map(cb => Number(cb.value))
    : null;
  const errEl = document.getElementById('addStockErr');
  errEl.style.display = 'none';
  if (!name) { errEl.textContent = 'Stock name is required.'; errEl.style.display = 'block'; return; }
  if (dayMode === 'specific' && (!days || !days.length)) {
    errEl.textContent = 'Select at least one day, or choose Daily.'; errEl.style.display = 'block'; return;
  }

  const isGents  = document.querySelector('input[name=asGender]:checked')?.value === 'gents';
  const filtered = allEmployees.filter(e =>
    isGents ? (e.gender || '').toUpperCase() === 'MALE' : (e.gender || '').toUpperCase() === 'FEMALE'
  );

  const list = document.getElementById('asEmpList');
  list.innerHTML = filtered.map(e => {
    const alias    = e.alias_name || e.name;
    const initials = alias.split(/[\s\-]+/).map(w => w[0]).slice(0, 2).join('');
    const g        = (e.gender || '').toLowerCase() === 'male' ? 'male' : 'female';
    const avatarBg = g === 'male' ? '#1a2d4a' : '#2e1a2e';
    const avatarCl = g === 'male' ? '#5b9bd5' : '#c97ab2';
    return `<label style="display:flex;align-items:center;gap:10px;padding:9px 12px;background:#1a2230;border:1px solid #222d3d;border-radius:8px;cursor:pointer">
      <input type="checkbox" value="${esc(alias)}" checked style="accent-color:#d4af37;cursor:pointer;width:15px;height:15px;flex-shrink:0"/>
      <div style="width:30px;height:30px;border-radius:50%;background:${avatarBg};color:${avatarCl};display:grid;place-items:center;font-family:'Fraunces',serif;font-weight:700;font-size:12px;flex-shrink:0">${initials}</div>
      <span style="font-size:13px;font-weight:600;color:#e6edf3">${esc(alias)}</span>
    </label>`;
  }).join('') || '<div style="font-size:13px;color:#8b98a8;padding:8px 0">No employees found for this gender.</div>';

  document.getElementById('asStep2Sub').textContent =
    `Choose which ${isGents ? 'male' : 'female'} staff are eligible for this stock. All are pre-selected.`;

  document.getElementById('asStep1').style.display = 'none';
  document.getElementById('asStep2').style.display = 'block';
  document.getElementById('asStep1Dot').style.background = '#d4af37';
  document.getElementById('asStep2Dot').style.background = '#d4af37';
  document.getElementById('asStepLabel').textContent = 'Step 2 of 2';
  document.getElementById('addStockErr').style.display = 'none';
}

function asSelectAll(checked) {
  document.querySelectorAll('#asEmpList input[type=checkbox]').forEach(cb => cb.checked = checked);
}

async function submitAddStock() {
  const name     = document.getElementById('asName').value.trim();
  const slots    = parseInt(document.getElementById('asSlots').value) || 1;
  const timing   = document.getElementById('asTiming').value;
  const isGents  = document.querySelector('input[name=asGender]:checked')?.value === 'gents';
  const dayMode  = document.querySelector('input[name=asDayMode]:checked')?.value || 'daily';
  const days     = dayMode === 'specific'
    ? [...document.querySelectorAll('#asDayPicker input[type=checkbox]:checked')].map(cb => Number(cb.value))
    : null;
  const employees = [...document.querySelectorAll('#asEmpList input[type=checkbox]:checked')].map(cb => cb.value);
  const errEl    = document.getElementById('addStockErr');
  const btn      = document.getElementById('asSubmitBtn');

  errEl.style.display = 'none';
  if (!employees.length) {
    errEl.textContent = 'Select at least one employee.'; errEl.style.display = 'block'; return;
  }

  btn.disabled = true;
  btn.textContent = 'Creating…';
  try {
    const res = await fetch('/api/custom-stock', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ label: name, slots, timing, gents: isGents, employees, ...(days && { days }) }),
    });
    const d = await res.json();
    if (!res.ok) { errEl.textContent = d.error || 'Failed to create stock.'; errEl.style.display = 'block'; btn.disabled = false; btn.textContent = 'Create Stock'; return; }
    closeAddStockModal();
    toast(`✅ ${d.label} created`);
    setTimeout(() => location.reload(), 800);
  } catch (e) {
    errEl.textContent = 'Network error. Please try again.';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Create Stock';
  }
}

/* ═══════════════════════════════════════════════════════════════════════
   EDIT STOCK MODAL
═══════════════════════════════════════════════════════════════════════ */
function esGenderChange() {
  const isGents = document.querySelector('input[name=esGender]:checked')?.value === 'gents';
  document.getElementById('esGenderFemaleLabel').style.borderColor = isGents ? '#222d3d' : '#d4af37';
  document.getElementById('esGenderGentsLabel').style.borderColor  = isGents ? '#d4af37' : '#222d3d';
}

function esToggleDayPicker(mode) {
  document.getElementById('esDayPicker').style.display = mode === 'specific' ? 'flex' : 'none';
}

function openEditModal() {
  const cat = CATEGORIES.find(c => c.id === currentCat);
  if (!cat) return;

  document.getElementById('esName').value    = cat.label;
  document.getElementById('esSlots').value   = cat.slots || 1;
  document.getElementById('esTiming').value  = cat.timing || 'any';

  // Gender
  const gentsVal = cat.gents ? 'gents' : 'female';
  document.querySelector(`input[name=esGender][value=${gentsVal}]`).checked = true;
  esGenderChange();

  // Days
  const hasDays = Array.isArray(cat.days) && cat.days.length;
  if (hasDays) {
    document.querySelector('input[name=esDayMode][value=specific]').checked = true;
    document.getElementById('esDayPicker').style.display = 'flex';
    document.querySelectorAll('#esDayPicker input[type=checkbox]').forEach(cb => {
      cb.checked = cat.days.includes(Number(cb.value));
    });
  } else {
    document.querySelector('input[name=esDayMode][value=daily]').checked = true;
    document.getElementById('esDayPicker').style.display = 'none';
    document.querySelectorAll('#esDayPicker input[type=checkbox]').forEach(cb => cb.checked = false);
  }

  document.getElementById('editStockErr').style.display = 'none';
  document.getElementById('esSubmitBtn').disabled = false;
  document.getElementById('esSubmitBtn').textContent = 'Save Changes';
  document.getElementById('editStockOverlay').style.display = 'flex';
  setTimeout(() => document.getElementById('esName').focus(), 80);
}

function closeEditModal() {
  document.getElementById('editStockOverlay').style.display = 'none';
}

async function submitEditStock() {
  const name    = document.getElementById('esName').value.trim();
  const slots   = parseInt(document.getElementById('esSlots').value) || 1;
  const timing  = document.getElementById('esTiming').value;
  const isGents = document.querySelector('input[name=esGender]:checked')?.value === 'gents';
  const dayMode = document.querySelector('input[name=esDayMode]:checked')?.value || 'daily';
  const days    = dayMode === 'specific'
    ? [...document.querySelectorAll('#esDayPicker input[type=checkbox]:checked')].map(cb => Number(cb.value))
    : null;
  const errEl = document.getElementById('editStockErr');
  const btn   = document.getElementById('esSubmitBtn');

  errEl.style.display = 'none';
  if (!name) { errEl.textContent = 'Stock name is required.'; errEl.style.display = 'block'; return; }
  if (dayMode === 'specific' && (!days || !days.length)) {
    errEl.textContent = 'Select at least one day, or choose Daily.'; errEl.style.display = 'block'; return;
  }

  btn.disabled = true; btn.textContent = 'Saving…';
  try {
    const res = await fetch(`/api/custom-stock/${currentCat}`, {
      method:  'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ label: name, slots, timing, gents: isGents, ...(days && { days }) }),
    });
    const d = await res.json();
    if (!res.ok) { errEl.textContent = d.error || 'Failed to save.'; errEl.style.display = 'block'; btn.disabled = false; btn.textContent = 'Save Changes'; return; }
    // Update local state
    const cat = CATEGORIES.find(c => c.id === currentCat);
    if (cat) { cat.label = d.label; cat.slots = slots; cat.timing = timing; cat.gents = isGents; cat.days = days; }
    closeEditModal();
    document.getElementById('stockTitle').textContent = d.label;
    document.getElementById('gentsNotice').style.display = isGents ? 'inline-flex' : 'none';
    renderCatNav();
    toast(`✅ ${d.label} updated`);
  } catch (e) {
    errEl.textContent = 'Network error. Please try again.';
    errEl.style.display = 'block'; btn.disabled = false; btn.textContent = 'Save Changes';
  }
}

/* ═══════════════════════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════════════════════ */
(async function init() {
  try {
    const [empRes, catsRes, meRes] = await Promise.all([
      fetch('/api/employees'),
      fetch('/api/stock-categories'),
      fetch('/api/me'),
    ]);
    allEmployees = await empRes.json();
    const cats   = await catsRes.json();
    const me     = await meRes.json().catch(() => ({}));

    CATEGORIES = cats.map(c => ({
      id:        c.id,
      label:     c.label,
      gents:     c.gents || false,
      is_active: c.is_active !== false,
      is_custom: c.custom === true,
      timing:    Array.isArray(c.timing) ? c.timing[0] : (c.timing || 'any'),
      slots:     c.slots || 1,
      days:      c.days || null,
      group:     STOCK_GROUPS[c.id] || (c.id in STOCK_GROUPS ? STOCK_GROUPS[c.id] : null),
    }));
    // Assign group labels: only first occurrence of a group gets the header
    const seenGroups = new Set();
    CATEGORIES = CATEGORIES.map(c => {
      const grp = STOCK_GROUPS[c.id] || (cats.find(x=>x.id===c.id) ? 'Custom' : null);
      const showGroup = grp && !seenGroups.has(grp) ? grp : null;
      if (grp) seenGroups.add(grp);
      return { ...c, group: showGroup };
    });

    if (me.role === 'OWNER') {
      isOwner = true;
      document.getElementById('addStockBtn').style.display = 'flex';
    }
  } catch (_) {}
  renderCatNav();
})();
</script>
