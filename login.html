<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
<meta name="theme-color" content="#b8973a"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="APPACHI"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icons/icon-192.png"/>
<title>Sign In · APPACHI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117; --panel: #131922; --panel-elev: #1a2230;
    --border: #222d3d; --text: #e6edf3; --text-dim: #8b98a8; --accent: #d4af37;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: clamp(14px, 1.6vw, 16px); }
  html, body { height: 100%; width: 100%; overflow-x: hidden; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; gap: 20px; }

  .card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 16px;
    padding: 36px 32px 32px; width: 100%; max-width: 400px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.4);
  }
  .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
  .brand-mark {
    width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0;
    background: linear-gradient(135deg, var(--accent), #9c7c1a);
    display: grid; place-items: center;
    font-family: 'Fraunces', serif; font-weight: 800; font-size: 18px; color: #0d1117;
  }
  .brand-name { font-family: 'Fraunces', serif; font-weight: 600; font-size: 20px; }
  .brand-sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

  /* Tabs */
  .tabs { display: flex; background: var(--panel-elev); border-radius: 10px; padding: 4px; margin-bottom: 24px; }
  .tab {
    flex: 1; padding: 9px 12px; border: none; border-radius: 7px; background: transparent;
    color: var(--text-dim); font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: background 0.15s, color 0.15s;
  }
  .tab.active { background: var(--panel); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.3); }

  /* Forms */
  .form { display: none; } .form.active { display: block; }
  label { display: block; font-size: 11px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 8px; }
  .field { margin-bottom: 16px; }
  input {
    width: 100%; padding: 11px 14px; background: var(--panel-elev); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 15px;
    outline: none; transition: border-color 0.15s; -webkit-appearance: none;
  }
  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--text-dim); opacity: 0.5; }
  input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type=number] { -moz-appearance: textfield; }

  .btn {
    width: 100%; padding: 13px; background: linear-gradient(135deg, var(--accent), #9c7c1a);
    border: none; border-radius: 8px; color: #0d1117; font-family: 'Inter', sans-serif;
    font-size: 14px; font-weight: 700; cursor: pointer; letter-spacing: .3px;
    transition: opacity 0.15s; margin-top: 4px;
  }
  .btn:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .error {
    display: none; background: rgba(255,93,93,0.12); border: 1px solid rgba(255,93,93,0.3);
    border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #ff5d5d; margin-bottom: 16px;
  }
  .error.show { display: block; }

  .links { display: flex; justify-content: center; gap: 20px; font-size: 12px; }
  .links a { color: var(--text-dim); text-decoration: none; transition: color 0.15s; }
  .links a:hover { color: var(--accent); }

  .stay-row { display: flex; align-items: center; gap: 8px; margin: 12px 0 4px; }
  .stay-row input[type=checkbox] { width: 15px; height: 15px; padding: 0; background: none; border: none; border-radius: 0; -webkit-appearance: checkbox; appearance: checkbox; accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }
  .stay-row label { font-size: 12px; font-weight: 500; color: var(--text-dim); text-transform: none; letter-spacing: 0; margin: 0; cursor: pointer; }

  .footer { font-size: 11px; color: var(--text-dim); text-align: center; font-family: 'JetBrains Mono', monospace; }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-mark">S</div>
      <div>
        <div class="brand-name">Stocks</div>
        <div class="brand-sub">APPACHI JEWELLERY</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab" onclick="switchTab('email')">Email &amp; Password</button>
      <button class="tab active" onclick="switchTab('pin')">ID &amp; PIN</button>
    </div>

    <!-- Error -->
    <div class="error" id="errMsg"></div>

    <!-- Email + Password form -->
    <form class="form" id="emailForm" onsubmit="handleLogin(event,'email')">
      <div class="field">
        <label>Email</label>
        <input id="email" type="email" placeholder="your@email.com" autocomplete="email" required/>
      </div>
      <div class="field">
        <label>Password</label>
        <input id="password" type="password" placeholder="Your password" autocomplete="current-password" required/>
      </div>
      <div class="stay-row">
        <input type="checkbox" id="stayEmail" checked/>
        <label for="stayEmail">Stay logged in for 30 days</label>
      </div>
      <button class="btn" type="submit" id="emailBtn">Sign In</button>
    </form>

    <!-- ID + PIN form -->
    <form class="form active" id="pinForm" onsubmit="handleLogin(event,'pin')">
      <div class="field">
        <label>Employee ID</label>
        <input id="empId" type="text" inputmode="numeric" placeholder="e.g. 55" autocomplete="username"/>
      </div>
      <div class="field">
        <label>PIN</label>
        <input id="pin" type="password" inputmode="numeric" placeholder="Your PIN" autocomplete="current-password"/>
      </div>
      <div class="stay-row">
        <input type="checkbox" id="stayPin" checked/>
        <label for="stayPin">Stay logged in for 30 days</label>
      </div>
      <button class="btn" type="submit" id="pinBtn">Sign In</button>
    </form>
  </div>

  <div class="links">
    <a href="/signup.html">New employee? Sign up</a>
    <a href="/reset.html">Forgot password? Reset</a>
  </div>

  <div class="footer">Contact your admin for signup codes &amp; resets</div>

<script>
fetch('/api/me').then(r => {
  if (r.ok) r.json().then(me => {
    window.location.replace(me.role === 'COMPUTER' ? '/entry.html' : '/');
  });
}).catch(() => {});

function roleRedirect(role) {
  window.location.replace(role === 'COMPUTER' ? '/entry.html' : '/');
}

let activeTab = 'pin';
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (i === 0 && tab === 'email') || (i === 1 && tab === 'pin')));
  document.getElementById('emailForm').classList.toggle('active', tab === 'email');
  document.getElementById('pinForm').classList.toggle('active', tab === 'pin');
  document.getElementById('errMsg').classList.remove('show');
}

async function handleLogin(e, mode) {
  e.preventDefault();
  const err = document.getElementById('errMsg');
  const btn = document.getElementById(mode === 'email' ? 'emailBtn' : 'pinBtn');
  err.classList.remove('show');
  btn.disabled = true; btn.textContent = 'Signing in…';

  const stayLoggedIn = mode === 'email'
    ? document.getElementById('stayEmail').checked
    : document.getElementById('stayPin').checked;

  const body = mode === 'email'
    ? { email: document.getElementById('email').value.trim(), password: document.getElementById('password').value, stayLoggedIn }
    : { employee_id: document.getElementById('empId').value.trim(), pin: document.getElementById('pin').value, stayLoggedIn };

  try {
    const r = await fetch('/api/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body),
    });
    const d = await r.json();
    if (!r.ok || !d.ok) {
      err.textContent = d.error || 'Invalid credentials. Try again.';
      err.classList.add('show');
    } else {
      // Request notification permission while inside the login tap (user gesture context)
      if ('Notification' in window && 'PushManager' in window && Notification.permission === 'default') {
        try { await Notification.requestPermission(); } catch {}
      }
      roleRedirect(d.role);
    }
  } catch {
    err.textContent = 'Network error. Please try again.';
    err.classList.add('show');
  }
  btn.disabled = false; btn.textContent = 'Sign In';
}
</script>
</body>
</html>
